<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw Chart — Agent Topology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0c10;
  --bg-surface: #12151c;
  --bg-card: #181c26;
  --bg-card-hover: #1e2330;
  --border: #2a3040;
  --border-glow: #3a4560;
  --text-primary: #e8ecf4;
  --text-secondary: #8892a8;
  --text-muted: #505870;

  /* Agent domain colors */
  --c-orchestrator: #f59e0b;
  --c-trading: #ef4444;
  --c-coding: #8b5cf6;
  --c-production: #10b981;
  --c-logistics: #3b82f6;
  --c-infra: #6366f1;
  --c-life: #ec4899;
  --c-meta: #64748b;

  /* Status */
  --s-active: #22c55e;
  --s-stale: #f59e0b;
  --s-dead: #ef4444;
  --s-unverified: #64748b;

  /* Model tiers */
  --m-opus: #f59e0b;
  --m-sonnet: #8b5cf6;
  --m-haiku: #22d3ee;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* Header */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 48px;
  background: linear-gradient(180deg, rgba(10,12,16,0.95) 0%, rgba(10,12,16,0.8) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 100;
  gap: 16px;
}

.header-title {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
}

.header-title span { color: var(--c-orchestrator); }

.header-stats {
  display: flex;
  gap: 20px;
  margin-left: auto;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-secondary);
}

.header-stat {
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.stat-dot.active { background: var(--s-active); box-shadow: 0 0 6px var(--s-active); }
.stat-dot.stale { background: var(--s-stale); }
.stat-dot.dead { background: var(--s-dead); }

.legend-toggle {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
}
.legend-toggle:hover {
  border-color: var(--border-glow);
  color: var(--text-primary);
}

/* Canvas */
#canvas {
  position: absolute;
  top: 48px;
  left: 0;
  right: 0;
  bottom: 0;
  cursor: grab;
}

#canvas:active { cursor: grabbing; }

#canvas svg {
  width: 100%;
  height: 100%;
}

/* Edges */
.edge {
  fill: none;
  stroke-width: 1.5;
  opacity: 0.4;
  transition: opacity 0.3s, stroke-width 0.3s;
}

.edge.highlighted {
  opacity: 0.9;
  stroke-width: 2.5;
}

.edge-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  fill: var(--text-muted);
  opacity: 0;
  transition: opacity 0.3s;
}

.edge-label.visible { opacity: 1; }

/* Animated data flow particles */
@keyframes flowParticle {
  0% { offset-distance: 0%; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { offset-distance: 100%; opacity: 0; }
}

/* Nodes */
.node-group { cursor: pointer; }

.node-card {
  rx: 8;
  ry: 8;
  fill: var(--bg-card);
  stroke-width: 1.5;
  transition: fill 0.2s, filter 0.3s;
}

.node-group:hover .node-card {
  fill: var(--bg-card-hover);
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.05));
}

.node-group.selected .node-card {
  stroke-width: 2.5;
  filter: drop-shadow(0 0 20px rgba(255,255,255,0.08));
}

.node-name {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 13px;
  fill: var(--text-primary);
}

.node-role {
  font-family: 'Outfit', sans-serif;
  font-weight: 400;
  font-size: 11px;
  fill: var(--text-secondary);
}

.node-model {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 10px;
}

.node-status-dot {
  transition: fill 0.3s;
}

.node-badge {
  rx: 4;
  ry: 4;
  fill: rgba(255,255,255,0.06);
}

.node-badge-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
}

/* Detail panel */
.detail-panel {
  position: fixed;
  right: -380px;
  top: 48px;
  bottom: 0;
  width: 360px;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 50;
}

.detail-panel.open { right: 0; }

.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all 0.2s;
}
.detail-close:hover { background: var(--bg-card); color: var(--text-primary); }

.detail-header {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.detail-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}

.detail-role {
  color: var(--text-secondary);
  font-size: 14px;
}

.detail-section {
  margin-bottom: 20px;
}

.detail-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
}

.detail-row-label { color: var(--text-secondary); }
.detail-row-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

.detail-connections {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.detail-conn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.detail-conn:hover { background: var(--bg-card-hover); }

.detail-conn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.detail-conn-name {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 12px;
}

.detail-conn-type {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 11px;
}

/* Legend overlay */
.legend {
  position: fixed;
  top: 60px;
  left: 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  font-size: 12px;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-8px);
  transition: all 0.25s;
}

.legend.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.legend-title {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  color: var(--text-secondary);
}

.legend-swatch {
  width: 12px;
  height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

/* Minimap */
.minimap {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 180px;
  height: 120px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  z-index: 50;
}

.minimap-viewport {
  stroke: var(--c-orchestrator);
  stroke-width: 1;
  fill: rgba(245, 158, 11, 0.05);
}

/* Search */
.search-box {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0;
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s;
  width: 320px;
  overflow: hidden;
}

.search-box.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}

.search-input {
  width: 100%;
  padding: 12px 16px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

.search-input::placeholder { color: var(--text-muted); }

.search-results {
  border-top: 1px solid var(--border);
  max-height: 200px;
  overflow-y: auto;
  display: none;
}

.search-result {
  padding: 8px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  transition: background 0.15s;
}

.search-result:hover { background: var(--bg-card); }

.search-result-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Grid background */
.grid-pattern {
  opacity: 0.03;
}

/* Tooltip */
.tooltip {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border-glow);
  border-radius: 6px;
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 200;
  white-space: nowrap;
}

.tooltip.visible { opacity: 1; }

/* Zoom controls */
.zoom-controls {
  position: fixed;
  bottom: 16px;
  left: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 50;
}

.zoom-btn {
  width: 32px;
  height: 32px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  transition: all 0.15s;
}

.zoom-btn:hover {
  border-color: var(--border-glow);
  color: var(--text-primary);
}

.zoom-level {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
  padding: 2px 0;
}

/* Pulse animation for active nodes */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.pulse { animation: pulse 2s ease-in-out infinite; }
</style>
</head>

  production: 'var(--c-production)',
  logistics: 'var(--c-logistics)',
  infra: 'var(--c-infra)',
  life: 'var(--c-life)',
  meta: 'var(--c-meta)',
};

const statusColors = {
  active: 'var(--s-active)',
  stale: 'var(--s-stale)',
  dead: 'var(--s-dead)',
  unverified: 'var(--s-unverified)',
};

const modelColors = {
  opus: 'var(--m-opus)',
  sonnet: 'var(--m-sonnet)',
  haiku: 'var(--m-haiku)',
};

// Hierarchical layout positions
function layoutNodes() {
  const positions = {};
  const cx = 900, cy = 500;

  // Center: Atlas
  positions.atlas = { x: cx, y: cy };

  // Infrastructure ring (inner)
  positions.gateway = { x: cx - 300, y: cy - 50 };
  positions.telegram = { x: cx - 450, y: cy - 180 };
  positions.cron = { x: cx - 450, y: cy + 80 };
  positions.monitor = { x: cx - 550, y: cy - 50 };
  positions['clickup-bridge'] = { x: cx - 550, y: cy + 200 };

  // Specialists ring
  positions.hex = { x: cx + 50, y: cy - 280 };
  positions.kiln = { x: cx + 320, y: cy - 120 };
  positions.razor = { x: cx + 320, y: cy + 120 };
  positions.meridian = { x: cx + 50, y: cy + 280 };

  // Coding sub-tree
  positions.friday = { x: cx + 180, y: cy - 420 };
  positions.qa = { x: cx + 380, y: cy - 420 };
  positions.dispatch = { x: cx - 100, y: cy - 380 };

  // Trading sub-tree
  positions.wire = { x: cx + 580, y: cy - 60 };
  positions.regime = { x: cx + 580, y: cy + 40 };
  positions.viper = { x: cx + 580, y: cy + 140 };
  positions.strategist = { x: cx + 580, y: cy + 240 };
  positions.dealer = { x: cx + 580, y: cy + 340 };
  positions.analyst = { x: cx + 780, y: cy + 240 };
  positions.ledger = { x: cx + 780, y: cy + 120 };

  // Life agents
  positions.scout = { x: cx - 180, y: cy + 380 };
  positions.guide = { x: cx - 20, y: cy + 440 };
  positions.sensei = { x: cx + 140, y: cy + 440 };

  // Work agents
  positions.grower = { x: cx + 500, y: cy - 200 };
  positions.radar = { x: cx - 250, y: cy + 250 };

  // Retired (bottom corner)
  positions.darwin = { x: cx - 400, y: cy + 400 };
  positions.comms = { x: cx - 250, y: cy + 500 };

  return positions;
}

// ==================== RENDERING ====================

let transform = { x: 0, y: 0, k: 0.85 };
let selectedNode = null;
let positions = layoutNodes();

function createSVG() {
  const canvas = document.getElementById('canvas');
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');

  // Defs
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  // Grid pattern
  const pattern = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
  pattern.setAttribute('id', 'grid');
  pattern.setAttribute('width', '40');
  pattern.setAttribute('height', '40');
  pattern.setAttribute('patternUnits', 'userSpaceOnUse');
  const gridDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  gridDot.setAttribute('cx', '20');
  gridDot.setAttribute('cy', '20');
  gridDot.setAttribute('r', '0.8');
  gridDot.setAttribute('fill', '#ffffff');
  pattern.appendChild(gridDot);
  defs.appendChild(pattern);

  // Glow filter
  const filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
  filter.setAttribute('id', 'glow');
  filter.innerHTML = `<feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>`;
  defs.appendChild(filter);

  svg.appendChild(defs);

  // Grid background
  const gridBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  gridBg.setAttribute('width', '4000');
  gridBg.setAttribute('height', '3000');
  gridBg.setAttribute('x', '-1000');
  gridBg.setAttribute('y', '-500');
  gridBg.setAttribute('fill', 'url(#grid)');
  gridBg.classList.add('grid-pattern');

  // Main group for pan/zoom
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'main-group');
  g.appendChild(gridBg);

  // Edges layer
  const edgesG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  edgesG.setAttribute('id', 'edges-layer');
  g.appendChild(edgesG);

  // Nodes layer
  const nodesG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  nodesG.setAttribute('id', 'nodes-layer');
  g.appendChild(nodesG);

  svg.appendChild(g);
  canvas.appendChild(svg);

  return { svg, g, edgesG, nodesG };
}

function renderEdges(edgesG) {
  edgesG.innerHTML = '';
  const drawn = new Set();

  agents.forEach(agent => {
    const from = positions[agent.id];
    if (!from) return;

    agent.connections.forEach(targetId => {
      const key = [agent.id, targetId].sort().join('-');
      if (drawn.has(key)) return;
      drawn.add(key);

      const to = positions[targetId];
      if (!to) return;

      const target = agents.find(a => a.id === targetId);
      const color = domainColors[agent.domain] || 'var(--border)';

      // Curved path
      const dx = to.x - from.x;
      const dy = to.y - from.y;
      const mx = (from.x + to.x) / 2;
      const my = (from.y + to.y) / 2;
      const offset = Math.min(Math.abs(dx), Math.abs(dy)) * 0.2;
      const cx1 = mx + (dy > 0 ? offset : -offset);
      const cy1 = my;

      const fromCx = from.x + CARD_W / 2;
      const fromCy = from.y + CARD_H / 2;
      const toCx = to.x + CARD_W / 2;
      const toCy = to.y + CARD_H / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M${fromCx},${fromCy} Q${(fromCx+toCx)/2 + offset},${(fromCy+toCy)/2 - offset} ${toCx},${toCy}`;
      path.setAttribute('d', d);
      path.setAttribute('stroke', color);
      path.classList.add('edge');
      path.dataset.from = agent.id;
      path.dataset.to = targetId;
      edgesG.appendChild(path);
    });
  });
}

function renderNodes(nodesG) {
  nodesG.innerHTML = '';

  agents.forEach(agent => {
    const pos = positions[agent.id];
    if (!pos) return;

    const color = domainColors[agent.domain];
    const statusColor = statusColors[agent.status];
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('node-group');
    g.dataset.id = agent.id;
    g.setAttribute('transform', `translate(${pos.x}, ${pos.y})`);

    // Card background
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('width', CARD_W);
    rect.setAttribute('height', CARD_H);
    rect.setAttribute('stroke', color);
    rect.classList.add('node-card');
    g.appendChild(rect);

    // Status dot
    const statusDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    statusDot.setAttribute('cx', 14);
    statusDot.setAttribute('cy', 18);
    statusDot.setAttribute('r', 4);
    statusDot.setAttribute('fill', statusColor);
    statusDot.classList.add('node-status-dot');
    if (agent.status === 'active') statusDot.classList.add('pulse');
    g.appendChild(statusDot);

    // Agent name
    const name = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    name.setAttribute('x', 26);
    name.setAttribute('y', 22);
    name.classList.add('node-name');
    name.textContent = agent.name;
    g.appendChild(name);

    // Role
    const role = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    role.setAttribute('x', 14);
    role.setAttribute('y', 40);
    role.classList.add('node-role');
    role.textContent = agent.role;
    g.appendChild(role);

    // Model badge
    if (agent.model) {
      const badgeX = 14;
      const badgeY = 48;
      const badgeW = agent.model.length * 7 + 12;

      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      badge.setAttribute('x', badgeX);
      badge.setAttribute('y', badgeY);
      badge.setAttribute('width', badgeW);
      badge.setAttribute('height', 18);
      badge.classList.add('node-badge');
      g.appendChild(badge);

      const badgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      badgeText.setAttribute('x', badgeX + 6);
      badgeText.setAttribute('y', badgeY + 13);
      badgeText.classList.add('node-badge-text');
      badgeText.setAttribute('fill', modelColors[agent.model] || 'var(--text-muted)');
      badgeText.textContent = agent.model;
      g.appendChild(badgeText);
    }

    // Type badge for infra/channels
    if (agent.type && !agent.model) {
      const typeX = 14;
      const typeY = 48;
      const label = agent.type === 'channel' ? 'channel' : 'service';
      const bw = label.length * 7 + 12;

      const badge = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      badge.setAttribute('x', typeX);
      badge.setAttribute('y', typeY);
      badge.setAttribute('width', bw);
      badge.setAttribute('height', 18);
      badge.classList.add('node-badge');
      g.appendChild(badge);

      const bt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      bt.setAttribute('x', typeX + 6);
      bt.setAttribute('y', typeY + 13);
      bt.classList.add('node-badge-text');
      bt.setAttribute('fill', 'var(--text-muted)');
      bt.textContent = label;
      g.appendChild(bt);
    }

    // Click handler
    g.addEventListener('click', (e) => {
      e.stopPropagation();
      selectNode(agent.id);
    });

    // Hover
    g.addEventListener('mouseenter', () => highlightConnections(agent.id));
    g.addEventListener('mouseleave', () => clearHighlights());

    nodesG.appendChild(g);
  });
}

// ==================== INTERACTION ====================

function highlightConnections(nodeId) {
  const agent = agents.find(a => a.id === nodeId);
  if (!agent) return;

  const connected = new Set(agent.connections);
  // Also find agents that connect TO this node
  agents.forEach(a => {
    if (a.connections.includes(nodeId)) connected.add(a.id);
  });

  // Dim non-connected edges
  document.querySelectorAll('.edge').forEach(e => {
    const from = e.dataset.from;
    const to = e.dataset.to;
    if (from === nodeId || to === nodeId) {
      e.classList.add('highlighted');
    }
  });

  // Show edge labels
  document.querySelectorAll('.edge-label').forEach(l => {
    if (l.dataset.from === nodeId || l.dataset.to === nodeId) {
      l.classList.add('visible');
    }
  });
}

function clearHighlights() {
  document.querySelectorAll('.edge.highlighted').forEach(e => e.classList.remove('highlighted'));
  document.querySelectorAll('.edge-label.visible').forEach(l => l.classList.remove('visible'));
}

function selectNode(nodeId) {
  const agent = agents.find(a => a.id === nodeId);
  if (!agent) return;

  // Toggle selection
  document.querySelectorAll('.node-group.selected').forEach(g => g.classList.remove('selected'));
  if (selectedNode === nodeId) {
    selectedNode = null;
    document.getElementById('detail-panel').classList.remove('open');
    return;
  }

  selectedNode = nodeId;
  const nodeEl = document.querySelector(`.node-group[data-id="${nodeId}"]`);
  if (nodeEl) nodeEl.classList.add('selected');

  showDetailPanel(agent);
}

function showDetailPanel(agent) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const connected = new Set(agent.connections);
  agents.forEach(a => {
    if (a.connections.includes(agent.id)) connected.add(a.id);
  });

  const connAgents = [...connected].map(id => agents.find(a => a.id === id)).filter(Boolean);

  content.innerHTML = `
    <div class="detail-header">
      <div class="detail-name" style="color:${domainColors[agent.domain]}">${agent.name}</div>
      <div class="detail-role">${agent.role}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Configuration</div>
      <div class="detail-row">
        <span class="detail-row-label">Status</span>
        <span class="detail-row-value" style="color:${statusColors[agent.status]}">${agent.status}</span>
      </div>
      <div class="detail-row">
        <span class="detail-row-label">Domain</span>
        <span class="detail-row-value">${agent.domain}</span>
      </div>
      <div class="detail-row">
        <span class="detail-row-label">Model</span>
        <span class="detail-row-value" style="color:${agent.model ? modelColors[agent.model] : 'var(--text-muted)'}">${agent.model || 'n/a'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-row-label">Schedule</span>
        <span class="detail-row-value">${agent.schedule}</span>
      </div>
      ${agent.session ? `<div class="detail-row">
        <span class="detail-row-label">Session</span>
        <span class="detail-row-value" style="font-size:10px">${agent.session}</span>
      </div>` : ''}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Notes</div>
      <div style="font-size:13px;color:var(--text-secondary);line-height:1.5">${agent.notes}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Connections (${connAgents.length})</div>
      <div class="detail-connections">
        ${connAgents.map(a => `
          <div class="detail-conn" onclick="selectNode('${a.id}')">
            <div class="detail-conn-dot" style="background:${domainColors[a.domain]}"></div>
            <span class="detail-conn-name">${a.name}</span>
            <span class="detail-conn-type">${a.role}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  panel.classList.add('open');
}

// ==================== PAN / ZOOM ====================

function applyTransform() {
  const g = document.getElementById('main-group');
  g.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
  document.getElementById('zoom-level').textContent = Math.round(transform.k * 100) + '%';
  updateMinimap();
}

let isPanning = false;
let panStart = { x: 0, y: 0 };

function initPanZoom() {
  const canvas = document.getElementById('canvas');

  canvas.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node-group')) return;
    isPanning = true;
    panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
  });

  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    transform.x = e.clientX - panStart.x;
    transform.y = e.clientY - panStart.y;
    applyTransform();
  });

  window.addEventListener('mouseup', () => { isPanning = false; });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    const newK = Math.max(0.15, Math.min(3, transform.k * delta));

    // Zoom towards cursor
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    transform.x = mx - (mx - transform.x) * (newK / transform.k);
    transform.y = my - (my - transform.y) * (newK / transform.k);
    transform.k = newK;
    applyTransform();
  }, { passive: false });

  // Click to deselect
  canvas.addEventListener('click', (e) => {
    if (!e.target.closest('.node-group')) {
      selectedNode = null;
      document.querySelectorAll('.node-group.selected').forEach(g => g.classList.remove('selected'));
      document.getElementById('detail-panel').classList.remove('open');
    }
  });

  // Zoom buttons
  document.getElementById('zoom-in').addEventListener('click', () => {
    transform.k = Math.min(3, transform.k * 1.2);
    applyTransform();
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    transform.k = Math.max(0.15, transform.k * 0.8);
    applyTransform();
  });
  document.getElementById('zoom-fit').addEventListener('click', fitToView);
}

function fitToView() {
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  agents.forEach(a => {
    const p = positions[a.id];
    if (!p) return;
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + CARD_W);
    maxY = Math.max(maxY, p.y + CARD_H);
  });

  const graphW = maxX - minX + 100;
  const graphH = maxY - minY + 100;
  const scale = Math.min(rect.width / graphW, rect.height / graphH) * 0.9;

  transform.k = Math.max(0.15, Math.min(2, scale));
  transform.x = (rect.width - graphW * transform.k) / 2 - minX * transform.k + 50 * transform.k;
  transform.y = (rect.height - graphH * transform.k) / 2 - minY * transform.k + 50 * transform.k;
  applyTransform();
}

// ==================== MINIMAP ====================

function initMinimap() {
  const container = document.getElementById('minimap');
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');
  svg.setAttribute('id', 'minimap-svg');
  container.appendChild(svg);
}

function updateMinimap() {
  const svg = document.getElementById('minimap-svg');
  if (!svg) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  agents.forEach(a => {
    const p = positions[a.id];
    if (!p) return;
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + CARD_W);
    maxY = Math.max(maxY, p.y + CARD_H);
  });

  const pad = 40;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const gw = maxX - minX;
  const gh = maxY - minY;

  svg.setAttribute('viewBox', `${minX} ${minY} ${gw} ${gh}`);

  let html = '';

  // Draw edges
  agents.forEach(agent => {
    const from = positions[agent.id];
    if (!from) return;
    agent.connections.forEach(tid => {
      const to = positions[tid];
      if (!to) return;
      html += `<line x1="${from.x+CARD_W/2}" y1="${from.y+CARD_H/2}" x2="${to.x+CARD_W/2}" y2="${to.y+CARD_H/2}" stroke="rgba(255,255,255,0.1)" stroke-width="3"/>`;
    });
  });

  // Draw nodes
  agents.forEach(a => {
    const p = positions[a.id];
    if (!p) return;
    const color = domainColors[a.domain];
    html += `<rect x="${p.x}" y="${p.y}" width="${CARD_W}" height="${CARD_H}" rx="4" fill="${color}" opacity="0.4"/>`;
  });

  // Viewport rect
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const vx = -transform.x / transform.k;
  const vy = -transform.y / transform.k;
  const vw = rect.width / transform.k;
  const vh = rect.height / transform.k;
  html += `<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" class="minimap-viewport" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.5)" stroke-width="4"/>`;

  svg.innerHTML = html;
}

// ==================== SEARCH ====================

function initSearch() {
  const btn = document.getElementById('search-btn');
  const box = document.getElementById('search-box');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  let open = false;

  function toggle() {
    open = !open;
    box.classList.toggle('visible', open);
    if (open) { input.value = ''; input.focus(); results.style.display = 'none'; }
  }

  btn.addEventListener('click', toggle);

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      toggle();
    }
    if (e.key === 'Escape' && open) toggle();
  });

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    if (!q) { results.style.display = 'none'; return; }

    const matches = agents.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.role.toLowerCase().includes(q) ||
      a.domain.toLowerCase().includes(q)
    );

    if (matches.length === 0) { results.style.display = 'none'; return; }

    results.style.display = 'block';
    results.innerHTML = matches.map(a => `
      <div class="search-result" data-id="${a.id}">
        <div class="search-result-dot" style="background:${domainColors[a.domain]}"></div>
        <span style="font-family:'JetBrains Mono',monospace;font-weight:600">${a.name}</span>
        <span style="color:var(--text-muted);margin-left:auto">${a.role}</span>
      </div>
    `).join('');

    results.querySelectorAll('.search-result').forEach(el => {
      el.addEventListener('click', () => {
        selectNode(el.dataset.id);
        panToNode(el.dataset.id);
        toggle();
      });
    });
  });
}

function panToNode(nodeId) {
  const pos = positions[nodeId];
  if (!pos) return;
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();

  transform.x = rect.width / 2 - (pos.x + CARD_W / 2) * transform.k;
  transform.y = rect.height / 2 - (pos.y + CARD_H / 2) * transform.k;
  applyTransform();
}

// ==================== LEGEND ====================

function initLegend() {
  const btn = document.getElementById('legend-btn');
  const legend = document.getElementById('legend');
  btn.addEventListener('click', () => legend.classList.toggle('visible'));

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.legend') && !e.target.closest('#legend-btn')) {
      legend.classList.remove('visible');
    }
  });
}

// ==================== STATS ====================

function updateStats() {
  const counts = { active: 0, stale: 0, dead: 0 };
  agents.forEach(a => {
    if (a.status === 'active') counts.active++;
    else if (a.status === 'stale') counts.stale++;
    else if (a.status === 'dead') counts.dead++;
  });
  document.getElementById('active-count').textContent = counts.active;
  document.getElementById('stale-count').textContent = counts.stale;
  document.getElementById('dead-count').textContent = counts.dead;
}

// ==================== DETAIL CLOSE ====================

document.getElementById('detail-close').addEventListener('click', () => {
  selectedNode = null;
  document.querySelectorAll('.node-group.selected').forEach(g => g.classList.remove('selected'));
  document.getElementById('detail-panel').classList.remove('open');
});

// ==================== INIT ====================

const { svg, g, edgesG, nodesG } = createSVG();
renderEdges(edgesG);
renderNodes(nodesG);
initPanZoom();
initMinimap();
initSearch();
initLegend();
updateStats();

// Center view on load
requestAnimationFrame(() => {
  fitToView();
});
</script>
