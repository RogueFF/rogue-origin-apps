<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw Chart — Agent Topology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   CLAW CHART v2 — Agent Topology Visualization
   Dark navy + warm amber/copper palette
   ═══════════════════════════════════════════════════ */

:root {
  --bg-deep: #080b12;
  --bg-surface: #0e1219;
  --bg-card: #141923;
  --bg-card-hover: #1a2030;
  --border: #1e2738;
  --border-glow: #2e3d55;
  --text-primary: #e4e8f0;
  --text-secondary: #7d8ba0;
  --text-muted: #404d62;

  /* Domain colors — warm amber/copper family + complements */
  --c-orchestrator: #d4870e;
  --c-trading: #c43e3e;
  --c-coding: #7c4dcc;
  --c-production: #1a9e6e;
  --c-logistics: #2d7cc4;
  --c-infra: #4a5080;
  --c-life: #b84d8a;
  --c-meta: #505868;

  /* Status */
  --s-active: #1dba5e;
  --s-stale: #d4870e;
  --s-dead: #c43e3e;

  /* Model tiers */
  --m-opus: #d4870e;
  --m-sonnet: #7c4dcc;
  --m-haiku: #1eb8c4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ─── HEADER ─────────────────────────────────────── */

.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: linear-gradient(180deg, rgba(8,11,18,0.96) 0%, rgba(8,11,18,0.85) 100%);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  z-index: 100;
  gap: 12px;
}

.header-title {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.header-title span { color: var(--c-orchestrator); }

.data-source {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.data-source.live { background: rgba(29,186,94,0.15); color: var(--s-active); border: 1px solid rgba(29,186,94,0.3); }
.data-source.static { background: rgba(212,135,14,0.15); color: var(--s-stale); border: 1px solid rgba(212,135,14,0.3); }

/* Filter buttons */
.filter-group {
  display: flex;
  gap: 4px;
  margin-left: 8px;
  flex-shrink: 0;
}

.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--border-glow); color: var(--text-secondary); }
.filter-btn.active { border-color: var(--text-secondary); color: var(--text-primary); background: rgba(255,255,255,0.04); }

.filter-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  align-self: center;
  margin: 0 4px;
}

.header-stats {
  display: flex;
  gap: 16px;
  margin-left: auto;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.header-stat {
  display: flex;
  align-items: center;
  gap: 5px;
}

.stat-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.stat-dot.active { background: var(--s-active); box-shadow: 0 0 6px var(--s-active); }
.stat-dot.stale { background: var(--s-stale); }
.stat-dot.dead { background: var(--s-dead); }

.header-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}

.header-btn:hover { border-color: var(--border-glow); color: var(--text-primary); }

/* ─── CANVAS ─────────────────────────────────────── */

#canvas {
  position: absolute;
  top: 52px; left: 0; right: 0; bottom: 0;
  cursor: grab;
}

#canvas:active { cursor: grabbing; }
#canvas svg { width: 100%; height: 100%; }

/* ─── EDGES ──────────────────────────────────────── */

.edge {
  fill: none;
  stroke-width: 1.2;
  opacity: 0.25;
  transition: opacity 0.3s, stroke-width 0.3s;
}

.edge.highlighted { opacity: 0.8; stroke-width: 2; }
.edge.dimmed { opacity: 0.06; }

.edge-label-bg {
  fill: var(--bg-deep);
  opacity: 0;
  transition: opacity 0.3s;
}

.edge-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  fill: var(--text-muted);
  opacity: 0;
  transition: opacity 0.3s;
  text-anchor: middle;
  pointer-events: none;
}

.edge-label.visible, .edge-label-bg.visible { opacity: 1; }

/* Animated flow particles */
.flow-particle {
  r: 2;
  opacity: 0;
}

/* ─── NODES ──────────────────────────────────────── */

.node-group {
  cursor: pointer;
  transition: opacity 0.3s;
}

.node-group.dimmed { opacity: 0.15; }
.node-group.hidden { display: none; }

.node-card {
  rx: 6; ry: 6;
  fill: var(--bg-card);
  stroke-width: 1.5;
  transition: fill 0.2s, filter 0.3s, stroke-width 0.2s;
}

.node-group:hover .node-card {
  fill: var(--bg-card-hover);
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.04));
}

.node-group.selected .node-card {
  stroke-width: 2.5;
  filter: drop-shadow(0 0 16px rgba(255,255,255,0.06));
}

.node-name {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 13px;
  fill: var(--text-primary);
}

.node-role {
  font-family: 'Outfit', sans-serif;
  font-weight: 400;
  font-size: 10px;
  fill: var(--text-secondary);
}

.node-model {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 9px;
}

.node-status-dot { transition: fill 0.3s; }

.node-badge {
  rx: 3; ry: 3;
  fill: rgba(255,255,255,0.05);
}

.node-badge-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
}

/* Connection count badge */
.conn-badge {
  rx: 8; ry: 8;
  fill: rgba(255,255,255,0.08);
}

.conn-badge-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  fill: var(--text-secondary);
  text-anchor: middle;
  dominant-baseline: central;
}

/* Atlas radial glow */
.atlas-glow {
  opacity: 0.08;
}

/* ─── DETAIL PANEL ───────────────────────────────── */

.detail-panel {
  position: fixed;
  right: -380px; top: 52px; bottom: 0;
  width: 360px;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 50;
}

.detail-panel.open { right: 0; }

.detail-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
  width: 28px; height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all 0.15s;
}

.detail-close:hover { background: var(--bg-card); color: var(--text-primary); }

.detail-header {
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.detail-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}

.detail-role {
  color: var(--text-secondary);
  font-size: 14px;
}

.detail-section { margin-bottom: 18px; }

.detail-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}

.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 13px;
}

.detail-row-label { color: var(--text-secondary); }
.detail-row-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

.detail-connections { display: flex; flex-direction: column; gap: 5px; }

.detail-conn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.detail-conn:hover { background: var(--bg-card-hover); }

.detail-conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.detail-conn-name {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 12px;
}

.detail-conn-label {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
}

/* ─── LEGEND ─────────────────────────────────────── */

.legend {
  position: fixed;
  top: 64px; left: 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  font-size: 12px;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-6px);
  transition: all 0.2s;
}

.legend.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.legend-title {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 2px 0;
  color: var(--text-secondary);
  font-size: 11px;
}

.legend-swatch {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.legend-divider {
  height: 1px;
  background: var(--border);
  margin: 6px 0;
}

/* ─── MINIMAP ────────────────────────────────────── */

.minimap {
  position: fixed;
  bottom: 16px; right: 16px;
  width: 160px; height: 100px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  z-index: 50;
}

.minimap-viewport {
  stroke: var(--c-orchestrator);
  stroke-width: 1;
  fill: rgba(212,135,14,0.04);
}

/* ─── SEARCH ─────────────────────────────────────── */

.search-box {
  position: fixed;
  top: 64px;
  left: 50%;
  transform: translateX(-50%) translateY(-6px);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  width: 320px;
  overflow: hidden;
}

.search-box.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}

.search-input {
  width: 100%;
  padding: 12px 16px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
}

.search-input::placeholder { color: var(--text-muted); }

.search-results {
  border-top: 1px solid var(--border);
  max-height: 200px;
  overflow-y: auto;
  display: none;
}

.search-result {
  padding: 8px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  transition: background 0.1s;
}

.search-result:hover { background: var(--bg-card); }
.search-result.active { background: var(--bg-card-hover); }

.search-result-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── ZOOM CONTROLS ──────────────────────────────── */

.zoom-controls {
  position: fixed;
  bottom: 16px; left: 16px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  z-index: 50;
}

.zoom-btn {
  width: 30px; height: 30px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  transition: all 0.1s;
}

.zoom-btn:hover { border-color: var(--border-glow); color: var(--text-primary); }

.zoom-level {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
  padding: 1px 0;
}

/* ─── ANIMATIONS ─────────────────────────────────── */

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@keyframes flowAnim {
  0% { offset-distance: 0%; opacity: 0; }
  5% { opacity: 0.8; }
  95% { opacity: 0.8; }
  100% { offset-distance: 100%; opacity: 0; }
}

.pulse { animation: pulse 2.5s ease-in-out infinite; }

.grid-pattern { opacity: 0.025; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-title"><span>⚡</span> Claw Chart</div>
  <div class="data-source static" id="data-source">Static</div>

  <div class="filter-group" id="domain-filters"></div>
  <div class="filter-sep"></div>
  <div class="filter-group" id="status-filters"></div>

  <div class="header-stats">
    <div class="header-stat"><div class="stat-dot active"></div><span id="active-count">0</span> active</div>
    <div class="header-stat"><div class="stat-dot stale"></div><span id="stale-count">0</span> stale</div>
    <div class="header-stat"><div class="stat-dot dead"></div><span id="dead-count">0</span> dead</div>
  </div>
  <button class="header-btn" id="legend-btn">Legend</button>
  <button class="header-btn" id="search-btn">⌘K</button>
</div>

<!-- ═══ CANVAS ═══ -->
<div id="canvas"></div>

<!-- ═══ LEGEND ═══ -->
<div class="legend" id="legend">
  <div class="legend-title">Domains</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--c-orchestrator)"></div>Orchestrator</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--c-trading)"></div>Trading</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--c-coding)"></div>Coding</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--c-production)"></div>Production</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--c-logistics)"></div>Logistics</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--c-infra)"></div>Infrastructure</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--c-life)"></div>Life</div>
  <div class="legend-divider"></div>
  <div class="legend-title">Status</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--s-active);border-radius:50%"></div>Active</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--s-stale);border-radius:50%"></div>Stale</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--s-dead);border-radius:50%"></div>Dead</div>
  <div class="legend-divider"></div>
  <div class="legend-title">Model</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--m-opus);border-radius:50%"></div>Opus</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--m-sonnet);border-radius:50%"></div>Sonnet</div>
  <div class="legend-item"><div class="legend-swatch" style="background:var(--m-haiku);border-radius:50%"></div>Haiku</div>
</div>

<!-- ═══ SEARCH ═══ -->
<div class="search-box" id="search-box">
  <input class="search-input" id="search-input" type="text" placeholder="Search agents…">
  <div class="search-results" id="search-results"></div>
</div>

<!-- ═══ DETAIL PANEL ═══ -->
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" id="detail-close">✕</button>
  <div id="detail-content"></div>
</div>

<!-- ═══ ZOOM CONTROLS ═══ -->
<div class="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <div class="zoom-level" id="zoom-level">100%</div>
  <button class="zoom-btn" id="zoom-out">−</button>
  <button class="zoom-btn" id="zoom-fit" style="font-size:10px;margin-top:3px">⊞</button>
</div>

<!-- ═══ MINIMAP ═══ -->
<div class="minimap" id="minimap"></div>

<script>
/* ═══════════════════════════════════════════════════
   CLAW CHART v2 — Engine
   Loads fleet.json, attempts live API, renders topology
   ═══════════════════════════════════════════════════ */

const CARD_W = 176;
const CARD_H = 68;

const DOMAIN_COLORS = {
  orchestrator: '#d4870e',
  trading: '#c43e3e',
  coding: '#7c4dcc',
  production: '#1a9e6e',
  logistics: '#2d7cc4',
  infra: '#4a5080',
  life: '#b84d8a',
  meta: '#505868',
};

const STATUS_COLORS = {
  active: '#1dba5e',
  stale: '#d4870e',
  dead: '#c43e3e',
};

const MODEL_COLORS = {
  opus: '#d4870e',
  sonnet: '#7c4dcc',
  haiku: '#1eb8c4',
};

/* ─── STATE ──────────────────────────────────────── */

let agents = [];
let positions = {};
let transform = { x: 0, y: 0, k: 0.8 };
let selectedNode = null;
let isLive = false;
let domainFilters = new Set();   // empty = show all
let statusFilters = new Set();
let searchOpen = false;
let searchIdx = -1;

/* ─── DATA LOADING ───────────────────────────────── */

async function loadData() {
  /* Load fleet.json (static baseline) */
  try {
    const resp = await fetch('fleet.json');
    agents = await resp.json();
  } catch (e) {
    console.error('Failed to load fleet.json:', e);
    return;
  }

  /* Try live agent monitor API */
  try {
    const resp = await fetch('http://localhost:9500/health', { signal: AbortSignal.timeout(2000) });
    if (resp.ok) {
      isLive = true;
      const el = document.getElementById('data-source');
      el.textContent = 'Live';
      el.className = 'data-source live';
    }
  } catch (_) {
    /* Static fallback — already set */
  }

  computeLayout();
  render();
  buildFilters();
  updateStats();
  requestAnimationFrame(fitToView);
}

/* ─── LAYOUT ─────────────────────────────────────── */

function computeLayout() {
  const cx = 900, cy = 520;
  const p = {};

  /* Atlas — center */
  p['atlas'] = { x: cx, y: cy };

  /* Infrastructure — left cluster */
  p['gateway']        = { x: cx - 320, y: cy - 30 };
  p['telegram']       = { x: cx - 500, y: cy - 160 };
  p['monitor']        = { x: cx - 540, y: cy + 20 };
  p['clickup-bridge'] = { x: cx - 500, y: cy + 180 };
  p['comms']          = { x: cx - 320, y: cy + 240 };

  /* Specialists — inner ring */
  p['hex']      = { x: cx + 30,  y: cy - 260 };
  p['kiln']     = { x: cx + 320, y: cy - 140 };
  p['meridian'] = { x: cx + 30,  y: cy + 260 };
  p['razor']    = { x: cx + 320, y: cy + 140 };

  /* Coding sub-tree — upper */
  p['friday']   = { x: cx + 160, y: cy - 400 };
  p['qa']       = { x: cx + 360, y: cy - 380 };
  p['dispatch'] = { x: cx - 120, y: cy - 360 };

  /* Trading sub-tree — right */
  p['wire']            = { x: cx + 560, y: cy - 40 };
  p['regime']          = { x: cx + 560, y: cy + 50 };
  p['viper']           = { x: cx + 560, y: cy + 140 };
  p['strategist']      = { x: cx + 560, y: cy + 230 };
  p['dealer']          = { x: cx + 560, y: cy + 320 };
  p['analyst']         = { x: cx + 760, y: cy + 230 };
  p['ledger']          = { x: cx + 760, y: cy + 100 };
  p['futures-monitor'] = { x: cx + 760, y: cy - 40 };
  p['price-update']    = { x: cx + 760, y: cy + 320 };

  /* Work agents */
  p['radar']    = { x: cx - 220, y: cy + 160 };
  p['qa-audit'] = { x: cx - 200, y: cy - 200 };

  /* Production */
  p['grower'] = { x: cx + 500, y: cy - 220 };

  /* Life — lower left */
  p['scout']  = { x: cx - 160, y: cy + 420 };
  p['guide']  = { x: cx + 10,  y: cy + 460 };
  p['sensei'] = { x: cx + 180, y: cy + 460 };

  /* Retired — far corner */
  p['darwin']       = { x: cx - 400, y: cy + 420 };
  p['geo-scanner']  = { x: cx + 380, y: cy + 460 };

  positions = p;
}

/* ─── RENDERING ──────────────────────────────────── */

/* ─── EDGES ──────────────────────────────────────── */

function renderEdges() {
  edgesLayer.innerHTML = '';
  particlesLayer.innerHTML = '';
  const drawn = new Set();

  agents.forEach(agent => {
    const from = positions[agent.id];
    if (!from || !agent.connections) return;

    agent.connections.forEach(conn => {
      const targetId = conn.to;
      const label = conn.label || '';
      const key = [agent.id, targetId].sort().join('|');
      if (drawn.has(key)) return;
      drawn.add(key);

      const to = positions[targetId];
      if (!to) return;

      const color = DOMAIN_COLORS[agent.domain] || '#2e3d55';
      const fromCx = from.x + CARD_W / 2;
      const fromCy = from.y + CARD_H / 2;
      const toCx = to.x + CARD_W / 2;
      const toCy = to.y + CARD_H / 2;

      /* Curved edge */
      const dx = toCx - fromCx;
      const dy = toCy - fromCy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const bend = Math.min(dist * 0.15, 60);
      const nx = -dy / dist * bend;
      const ny = dx / dist * bend;
      const mx = (fromCx + toCx) / 2 + nx;
      const my = (fromCy + toCy) / 2 + ny;
      const d = `M${fromCx},${fromCy} Q${mx},${my} ${toCx},${toCy}`;

      const path = svgNS('path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', color);
      path.classList.add('edge');
      path.dataset.from = agent.id;
      path.dataset.to = targetId;
      edgesLayer.appendChild(path);

      /* Edge label */
      if (label) {
        const lx = (fromCx + toCx) / 2 + nx * 0.6;
        const ly = (fromCy + toCy) / 2 + ny * 0.6;

        const labelBg = svgNS('rect');
        const tw = label.length * 5.5 + 8;
        labelBg.setAttribute('x', lx - tw / 2);
        labelBg.setAttribute('y', ly - 7);
        labelBg.setAttribute('width', tw);
        labelBg.setAttribute('height', 14);
        labelBg.setAttribute('rx', '3');
        labelBg.classList.add('edge-label-bg');
        labelBg.dataset.from = agent.id;
        labelBg.dataset.to = targetId;
        edgesLayer.appendChild(labelBg);

        const text = svgNS('text');
        text.setAttribute('x', lx);
        text.setAttribute('y', ly + 3);
        text.classList.add('edge-label');
        text.dataset.from = agent.id;
        text.dataset.to = targetId;
        text.textContent = label;
        edgesLayer.appendChild(text);
      }

      /* Flow particle (only for active agents) */
      if (agent.status === 'active') {
        const particle = svgNS('circle');
        particle.setAttribute('r', '2');
        particle.setAttribute('fill', color);
        particle.classList.add('flow-particle');
        particle.style.offsetPath = `path('${d}')`;
        particle.style.animation = `flowAnim ${3 + Math.random() * 4}s linear ${Math.random() * 3}s infinite`;
        particlesLayer.appendChild(particle);
      }
    });
  });
}

/* ─── NODES ──────────────────────────────────────── */

function renderNodes() {
  nodesLayer.innerHTML = '';

  agents.forEach(agent => {
    const pos = positions[agent.id];
    if (!pos) return;

    const color = DOMAIN_COLORS[agent.domain] || '#505868';
    const statusColor = STATUS_COLORS[agent.status] || '#505868';

    const g = svgNS('g');
    g.classList.add('node-group');
    g.dataset.id = agent.id;
    g.dataset.domain = agent.domain;
    g.dataset.status = agent.status;
    g.setAttribute('transform', `translate(${pos.x}, ${pos.y})`);

    /* Card */
    const rect = svgNS('rect');
    rect.setAttribute('width', CARD_W);
    rect.setAttribute('height', CARD_H);
    rect.setAttribute('stroke', color);
    rect.classList.add('node-card');
    g.appendChild(rect);

    /* Status dot */
    const sDot = svgNS('circle');
    sDot.setAttribute('cx', 12); sDot.setAttribute('cy', 16);
    sDot.setAttribute('r', 3.5);
    sDot.setAttribute('fill', statusColor);
    sDot.classList.add('node-status-dot');
    if (agent.status === 'active') sDot.classList.add('pulse');
    g.appendChild(sDot);

    /* Name */
    const name = svgNS('text');
    name.setAttribute('x', 22); name.setAttribute('y', 20);
    name.classList.add('node-name');
    name.textContent = agent.name;
    g.appendChild(name);

    /* Role */
    const role = svgNS('text');
    role.setAttribute('x', 12); role.setAttribute('y', 36);
    role.classList.add('node-role');
    role.textContent = agent.role;
    g.appendChild(role);

    /* Model / type badge */
    const badgeLabel = agent.model || (agent.type === 'channel' ? 'channel' : agent.type === 'service' ? 'service' : agent.type === 'infra' ? 'service' : null);
    if (badgeLabel) {
      const bx = 12, by = 44;
      const bw = badgeLabel.length * 6 + 10;

      const badge = svgNS('rect');
      badge.setAttribute('x', bx); badge.setAttribute('y', by);
      badge.setAttribute('width', bw); badge.setAttribute('height', 16);
      badge.classList.add('node-badge');
      g.appendChild(badge);

      const bt = svgNS('text');
      bt.setAttribute('x', bx + 5); bt.setAttribute('y', by + 11.5);
      bt.classList.add('node-badge-text');
      bt.setAttribute('fill', MODEL_COLORS[agent.model] || '#505868');
      bt.textContent = badgeLabel;
      g.appendChild(bt);
    }

    /* Connection count badge */
    const totalConns = countConnections(agent.id);
    if (totalConns > 0) {
      const cx = CARD_W - 16;
      const cy = 16;

      const cb = svgNS('rect');
      cb.setAttribute('x', cx - 10); cb.setAttribute('y', cy - 8);
      cb.setAttribute('width', 20); cb.setAttribute('height', 16);
      cb.classList.add('conn-badge');
      g.appendChild(cb);

      const ct = svgNS('text');
      ct.setAttribute('x', cx); ct.setAttribute('y', cy);
      ct.classList.add('conn-badge-text');
      ct.textContent = totalConns;
      g.appendChild(ct);
    }

    /* Events */
    g.addEventListener('click', e => { e.stopPropagation(); selectNode(agent.id); });
    g.addEventListener('dblclick', e => { e.stopPropagation(); centerOnNode(agent.id); });
    g.addEventListener('mouseenter', () => highlightConnections(agent.id));
    g.addEventListener('mouseleave', clearHighlights);

    nodesLayer.appendChild(g);
  });
}

function countConnections(nodeId) {
  let c = 0;
  agents.forEach(a => {
    if (a.id === nodeId && a.connections) c += a.connections.length;
    if (a.connections) a.connections.forEach(conn => { if (conn.to === nodeId) c++; });
  });
  return c;
}

/* ─── INTERACTIONS ───────────────────────────────── */

function getConnectedIds(nodeId) {
  const ids = new Set();
  agents.forEach(a => {
    if (a.id === nodeId && a.connections) a.connections.forEach(c => ids.add(c.to));
    if (a.connections) a.connections.forEach(c => { if (c.to === nodeId) ids.add(a.id); });
  });
  return ids;
}

function highlightConnections(nodeId) {
  const connected = getConnectedIds(nodeId);
  connected.add(nodeId);

  document.querySelectorAll('.edge').forEach(e => {
    if (e.dataset.from === nodeId || e.dataset.to === nodeId) {
      e.classList.add('highlighted');
    } else {
      e.classList.add('dimmed');
    }
  });

  document.querySelectorAll('.edge-label, .edge-label-bg').forEach(l => {
    if (l.dataset.from === nodeId || l.dataset.to === nodeId) l.classList.add('visible');
  });

  document.querySelectorAll('.node-group').forEach(g => {
    if (!connected.has(g.dataset.id)) g.classList.add('dimmed');
  });
}

function clearHighlights() {
  document.querySelectorAll('.edge.highlighted').forEach(e => e.classList.remove('highlighted'));
  document.querySelectorAll('.edge.dimmed').forEach(e => e.classList.remove('dimmed'));
  document.querySelectorAll('.edge-label.visible, .edge-label-bg.visible').forEach(l => l.classList.remove('visible'));
  document.querySelectorAll('.node-group.dimmed').forEach(g => g.classList.remove('dimmed'));
}

function selectNode(nodeId) {
  document.querySelectorAll('.node-group.selected').forEach(g => g.classList.remove('selected'));

  if (selectedNode === nodeId) {
    selectedNode = null;
    document.getElementById('detail-panel').classList.remove('open');
    return;
  }

  selectedNode = nodeId;
  const nodeEl = document.querySelector(`.node-group[data-id="${nodeId}"]`);
  if (nodeEl) nodeEl.classList.add('selected');

  const agent = agents.find(a => a.id === nodeId);
  if (agent) showDetailPanel(agent);
}

function centerOnNode(nodeId) {
  const pos = positions[nodeId];
  if (!pos) return;
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();

  const targetK = Math.max(transform.k, 1.2);
  transform.k = targetK;
  transform.x = rect.width / 2 - (pos.x + CARD_W / 2) * transform.k;
  transform.y = rect.height / 2 - (pos.y + CARD_H / 2) * transform.k;
  applyTransform();
  selectNode(nodeId);
}

/* ─── DETAIL PANEL ───────────────────────────────── */

function timeAgo(date) {
  const now = new Date();
  const diff = now - date;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

/* ─── PAN / ZOOM ─────────────────────────────────── */

function applyTransform() {
  mainGroup.setAttribute('transform', `translate(${transform.x},${transform.y}) scale(${transform.k})`);
  document.getElementById('zoom-level').textContent = Math.round(transform.k * 100) + '%';
  updateMinimap();
}

function initPanZoom() {
  const canvas = document.getElementById('canvas');
  let isPanning = false;
  let panStart = { x: 0, y: 0 };

  canvas.addEventListener('mousedown', e => {
    if (e.target.closest('.node-group')) return;
    isPanning = true;
    panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
  });

  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    transform.x = e.clientX - panStart.x;
    transform.y = e.clientY - panStart.y;
    applyTransform();
  });

  window.addEventListener('mouseup', () => { isPanning = false; });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    const newK = Math.max(0.12, Math.min(3, transform.k * delta));
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    transform.x = mx - (mx - transform.x) * (newK / transform.k);
    transform.y = my - (my - transform.y) * (newK / transform.k);
    transform.k = newK;
    applyTransform();
  }, { passive: false });

  canvas.addEventListener('click', e => {
    if (!e.target.closest('.node-group')) {
      selectedNode = null;
      document.querySelectorAll('.node-group.selected').forEach(g => g.classList.remove('selected'));
      document.getElementById('detail-panel').classList.remove('open');
    }
  });

  document.getElementById('zoom-in').addEventListener('click', () => {
    transform.k = Math.min(3, transform.k * 1.25);
    applyTransform();
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    transform.k = Math.max(0.12, transform.k * 0.8);
    applyTransform();
  });
  document.getElementById('zoom-fit').addEventListener('click', fitToView);
}

function fitToView() {
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  agents.forEach(a => {
    const p = positions[a.id];
    if (!p) return;
    const g = document.querySelector(`.node-group[data-id="${a.id}"]`);
    if (g && g.classList.contains('hidden')) return;
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + CARD_W);
    maxY = Math.max(maxY, p.y + CARD_H);
  });

  if (minX === Infinity) return;

  const gw = maxX - minX + 80;
  const gh = maxY - minY + 80;
  const scale = Math.min(rect.width / gw, rect.height / gh) * 0.88;

  transform.k = Math.max(0.12, Math.min(2, scale));
  transform.x = (rect.width - gw * transform.k) / 2 - minX * transform.k + 40 * transform.k;
  transform.y = (rect.height - gh * transform.k) / 2 - minY * transform.k + 40 * transform.k;
  applyTransform();
}

/* ─── MINIMAP ────────────────────────────────────── */

function initMinimap() {
  const container = document.getElementById('minimap');
  container.innerHTML = '';
  const svg = svgNS('svg');
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');
  svg.setAttribute('id', 'minimap-svg');
  container.appendChild(svg);
  updateMinimap();
}

function updateMinimap() {
  const svg = document.getElementById('minimap-svg');
  if (!svg) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  agents.forEach(a => {
    const p = positions[a.id];
    if (!p) return;
    minX = Math.min(minX, p.x);
    minY = Math.min(minY, p.y);
    maxX = Math.max(maxX, p.x + CARD_W);
    maxY = Math.max(maxY, p.y + CARD_H);
  });

  if (minX === Infinity) return;

  const pad = 30;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  svg.setAttribute('viewBox', `${minX} ${minY} ${maxX - minX} ${maxY - minY}`);

  let html = '';

  /* Edges */
  agents.forEach(a => {
    const from = positions[a.id];
    if (!from || !a.connections) return;
    a.connections.forEach(c => {
      const to = positions[c.to];
      if (!to) return;
      html += `<line x1="${from.x + CARD_W/2}" y1="${from.y + CARD_H/2}" x2="${to.x + CARD_W/2}" y2="${to.y + CARD_H/2}" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>`;
    });
  });

  /* Nodes */
  agents.forEach(a => {
    const p = positions[a.id];
    if (!p) return;
    html += `<rect x="${p.x}" y="${p.y}" width="${CARD_W}" height="${CARD_H}" rx="3" fill="${DOMAIN_COLORS[a.domain] || '#505868'}" opacity="0.35"/>`;
  });

  /* Viewport */
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const vx = -transform.x / transform.k;
  const vy = -transform.y / transform.k;
  const vw = rect.width / transform.k;
  const vh = rect.height / transform.k;
  html += `<rect x="${vx}" y="${vy}" width="${vw}" height="${vh}" class="minimap-viewport"/>`;

  svg.innerHTML = html;
}

/* ─── SEARCH ─────────────────────────────────────── */

function initSearch() {
  const btn = document.getElementById('search-btn');
  const box = document.getElementById('search-box');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');

  function toggle() {
    searchOpen = !searchOpen;
    box.classList.toggle('visible', searchOpen);
    if (searchOpen) { input.value = ''; input.focus(); results.style.display = 'none'; searchIdx = -1; }
  }

  btn.addEventListener('click', toggle);

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); toggle(); }
    if (e.key === 'Escape' && searchOpen) toggle();

    /* Navigate search results */
    if (searchOpen && results.style.display === 'block') {
      const items = results.querySelectorAll('.search-result');
      if (e.key === 'ArrowDown') { e.preventDefault(); searchIdx = Math.min(searchIdx + 1, items.length - 1); updateSearchHighlight(items); }
      if (e.key === 'ArrowUp') { e.preventDefault(); searchIdx = Math.max(searchIdx - 1, 0); updateSearchHighlight(items); }
      if (e.key === 'Enter' && searchIdx >= 0 && items[searchIdx]) { items[searchIdx].click(); }
    }
  });

  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    searchIdx = -1;
    if (!q) { results.style.display = 'none'; return; }

    const matches = agents.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.role.toLowerCase().includes(q) ||
      a.domain.toLowerCase().includes(q)
    );

    if (!matches.length) { results.style.display = 'none'; return; }

    results.style.display = 'block';
    results.innerHTML = matches.map(a => `
      <div class="search-result" data-id="${a.id}">
        <div class="search-result-dot" style="background:${DOMAIN_COLORS[a.domain] || '#505868'}"></div>
        <span style="font-family:'JetBrains Mono',monospace;font-weight:600">${a.name}</span>
        <span style="color:var(--text-muted);margin-left:auto;font-size:11px">${a.role}</span>
      </div>
    `).join('');

    results.querySelectorAll('.search-result').forEach(el => {
      el.addEventListener('click', () => {
        centerOnNode(el.dataset.id);
        toggle();
      });
    });
  });
}

function updateSearchHighlight(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === searchIdx));
}

/* ─── FILTERS ────────────────────────────────────── */

function buildFilters() {
  const domains = [...new Set(agents.map(a => a.domain))].sort();
  const statuses = ['active', 'stale', 'dead'];

  const df = document.getElementById('domain-filters');
  domains.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = d;
    btn.style.borderColor = DOMAIN_COLORS[d] || 'var(--border)';
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (btn.classList.contains('active')) domainFilters.add(d); else domainFilters.delete(d);
      applyFilters();
    });
    df.appendChild(btn);
  });

  const sf = document.getElementById('status-filters');
  statuses.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = s;
    btn.style.borderColor = STATUS_COLORS[s];
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (btn.classList.contains('active')) statusFilters.add(s); else statusFilters.delete(s);
      applyFilters();
    });
    sf.appendChild(btn);
  });
}

function applyFilters() {
  document.querySelectorAll('.node-group').forEach(g => {
    const domain = g.dataset.domain;
    const status = g.dataset.status;
    const domainOk = domainFilters.size === 0 || domainFilters.has(domain);
    const statusOk = statusFilters.size === 0 || statusFilters.has(status);
    g.classList.toggle('hidden', !(domainOk && statusOk));
  });

  /* Also hide edges to hidden nodes */
  const visibleIds = new Set();
  document.querySelectorAll('.node-group:not(.hidden)').forEach(g => visibleIds.add(g.dataset.id));

  document.querySelectorAll('.edge').forEach(e => {
    const show = visibleIds.has(e.dataset.from) && visibleIds.has(e.dataset.to);
    e.style.display = show ? '' : 'none';
  });
}

/* ─── KEYBOARD NAV ───────────────────────────────── */

function initKeyboardNav() {
  document.addEventListener('keydown', e => {
    if (searchOpen) return;
    if (!selectedNode) return;
    if (!['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) return;
    e.preventDefault();

    const connected = [...getConnectedIds(selectedNode)];
    if (!connected.length) return;

    const currentPos = positions[selectedNode];
    if (!currentPos) return;

    /* Sort by direction */
    const candidates = connected.map(id => ({
      id,
      pos: positions[id],
    })).filter(c => c.pos);

    let best = null;
    let bestScore = Infinity;

    candidates.forEach(c => {
      const dx = c.pos.x - currentPos.x;
      const dy = c.pos.y - currentPos.y;
      let score = Infinity;

      if (e.key === 'ArrowRight' && dx > 0) score = Math.abs(dy) - dx;
      if (e.key === 'ArrowLeft' && dx < 0) score = Math.abs(dy) + dx;
      if (e.key === 'ArrowDown' && dy > 0) score = Math.abs(dx) - dy;
      if (e.key === 'ArrowUp' && dy < 0) score = Math.abs(dx) + dy;

      if (score < bestScore) { bestScore = score; best = c.id; }
    });

    if (best) {
      centerOnNode(best);
    }
  });
}

/* ─── LEGEND ─────────────────────────────────────── */

function initLegend() {
  const btn = document.getElementById('legend-btn');
  const legend = document.getElementById('legend');
  btn.addEventListener('click', () => legend.classList.toggle('visible'));
  document.addEventListener('click', e => {
    if (!e.target.closest('.legend') && !e.target.closest('#legend-btn')) legend.classList.remove('visible');
  });
}

/* ─── DETAIL CLOSE ───────────────────────────────── */

function initDetailClose() {
  document.getElementById('detail-close').addEventListener('click', () => {
    selectedNode = null;
    document.querySelectorAll('.node-group.selected').forEach(g => g.classList.remove('selected'));
    document.getElementById('detail-panel').classList.remove('open');
  });
}

/* ─── STATS ──────────────────────────────────────── */

function updateStats() {
  const counts = { active: 0, stale: 0, dead: 0 };
  agents.forEach(a => {
    if (counts[a.status] !== undefined) counts[a.status]++;
  });
  document.getElementById('active-count').textContent = counts.active;
  document.getElementById('stale-count').textContent = counts.stale;
  document.getElementById('dead-count').textContent = counts.dead;
}

/* ─── HELPERS ────────────────────────────────────── */

function svgNS(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}
