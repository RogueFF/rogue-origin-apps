function strainColor(cultivar) {
  const c = (cultivar || '').toLowerCase();
  if (c.includes('lifter')) return '#E53935';
  if (c.includes('platinum') || c.includes('godfather')) return '#1E88E5';
  if (c.includes('lemon')) return '#43A047';
  return '#9E9E9E';
}

function shortDate(d) {
  const p = d.split('-');
  return parseInt(p[1]) + '/' + parseInt(p[2]);
}

const feb = allData.filter(d => d.production_date.startsWith('2026-02'));
const mar = allData.filter(d => d.production_date.startsWith('2026-03'));

function lbsPerOp(d) { return +(d.totalLbs / d.total_crew).toFixed(2); }

function monthlyAvg(data) {
  const vals = data.map(d => lbsPerOp(d));
  return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2);
}

const BAR_WIDTH = 180;

function buildChart(canvasId, avgId, monthLabel, data) {
  const avg = monthlyAvg(data);
  document.getElementById(avgId).textContent = monthLabel + ' Avg: ' + avg + ' lbs/op';

  const canvas = document.getElementById(canvasId);
  canvas.width = Math.max(data.length * BAR_WIDTH, 800);

  const labels = data.map(d => shortDate(d.production_date));
  const values = data.map(d => lbsPerOp(d));
  const colors = data.map(d => strainColor(d.cultivar1));

  const dataMax = Math.max(...values);
  const yMax = Math.ceil((dataMax + 0.2) * 5) / 5; // round up to nearest 0.2

  const ctx = canvas.getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Lbs per Operator',
        data: values,
        backgroundColor: colors,
        borderColor: colors,
        borderWidth: 1
      }]
    },
    options: {
      responsive: false,
      maintainAspectRatio: false,
      layout: {
        padding: { top: 30, right: 40, bottom: 10, left: 10 }
      },
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: 'top',
          font: { size: 10, weight: 'bold' },
          formatter: v => v.toFixed(2)
        }
      },
      scales: {
        x: {
          type: 'category',
          ticks: { font: { size: 10 }, maxRotation: 45, minRotation: 0, autoSkip: false, callback: function(val, index) { return this.getLabelForValue(val); } },
          grid: { display: false }
        },
        y: {
          min: 0,
          max: yMax,
          ticks: { font: { size: 11 }, stepSize: 0.2 },
          title: { display: true, text: 'Lbs per Operator', font: { size: 12 } }
        }
      }
    },
    plugins: [ChartDataLabels]
  });
}
