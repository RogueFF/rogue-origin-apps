<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Production Rate – Daily (February 2026)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F8F8F8; font-family: Arial, Helvetica, sans-serif; padding: 20px; }
  .container { margin: 0 auto; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 24px; color: #222; }
  .chart-section { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 24px; position: relative; }
  .chart-section h2 { font-size: 16px; color: #333; margin-bottom: 12px; }
  .monthly-avg { position: absolute; top: 14px; right: 18px; background: #F0F4FF; border: 1px solid #B0BEC5; border-radius: 4px; padding: 6px 14px; font-size: 16px; font-weight: bold; color: #333; z-index: 1; }
  .chart-wrap { overflow-x: auto; }
  canvas { display: block; }
  @media print {
    .chart-wrap { overflow: visible; }
    body { padding: 5px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Production Rate – Dynamic Target vs Actual (lbs/hr)</h1>
  <div class="chart-section">
    <h2>February 2026</h2>
    <div class="monthly-avg" id="febAvg"></div>
    <div class="chart-wrap"><canvas id="febChart" width="3600" height="500"></canvas></div>
  </div>
  <div class="chart-section">
    <h2>March 2026</h2>
    <div class="monthly-avg" id="marAvg"></div>
    <div class="chart-wrap"><canvas id="marChart" height="500"></canvas></div>
  </div>
</div>

<script>
// Corrected dates from source JSON + avgRate data
const allDays = [
  {date:"2026-02-02",avgRate:0.87,totalLbs:156.7,cultivar:"Lifter"},
  {date:"2026-02-03",avgRate:0.85,totalLbs:153.2,cultivar:"Lifter"},
  {date:"2026-02-04",avgRate:0.83,totalLbs:150.5,cultivar:"Lifter"},
  {date:"2026-02-05",avgRate:0.79,totalLbs:279.7,cultivar:"Lifter"},
  {date:"2026-02-06",avgRate:0.66,totalLbs:159.1,cultivar:"Unknown"},
  {date:"2026-02-09",avgRate:0.71,totalLbs:133.5,cultivar:"Lifter"},
  {date:"2026-02-10",avgRate:0.96,totalLbs:197.4,cultivar:"Lifter"},
  {date:"2026-02-11",avgRate:0.91,totalLbs:173.3,cultivar:"Lifter"},
  {date:"2026-02-12",avgRate:0.88,totalLbs:165.9,cultivar:"Lifter"},
  {date:"2026-02-13",avgRate:1.13,totalLbs:130.3,cultivar:"Lifter"},
  {date:"2026-02-16",avgRate:0.94,totalLbs:178.3,cultivar:"Lifter"},
  {date:"2026-02-17",avgRate:0.97,totalLbs:175,cultivar:"Lifter"},
  {date:"2026-02-18",avgRate:0.84,totalLbs:196,cultivar:"Lifter"},
  {date:"2026-02-19",avgRate:0.86,totalLbs:146.6,cultivar:"Godfather OG"},
  {date:"2026-02-20",avgRate:0.90,totalLbs:196.8,cultivar:"Godfather OG"},
  {date:"2026-02-23",avgRate:0.94,totalLbs:201,cultivar:"Godfather OG"},
  {date:"2026-02-24",avgRate:0.82,totalLbs:154,cultivar:"Lifter"},
  {date:"2026-02-25",avgRate:0.86,totalLbs:250.7,cultivar:"Lifter"},
  {date:"2026-02-26",avgRate:0.79,totalLbs:228.5,cultivar:"Lifter"},
  {date:"2026-02-27",avgRate:0.95,totalLbs:176.1,cultivar:"Lifter"},
  {date:"2026-03-02",avgRate:0.91,totalLbs:217,cultivar:"Lifter"},
  {date:"2026-03-03",avgRate:0.83,totalLbs:186.4,cultivar:"Lifter"},
  {date:"2026-03-04",avgRate:0.87,totalLbs:240.3,cultivar:"Lifter"},
  {date:"2026-03-05",avgRate:0.86,totalLbs:147.7,cultivar:"Lifter"},
  {date:"2026-03-06",avgRate:0.89,totalLbs:164.9,cultivar:"Lifter"},
  {date:"2026-03-09",avgRate:0.98,totalLbs:183.1,cultivar:"Unknown"},
  {date:"2026-03-10",avgRate:1.02,totalLbs:211.4,cultivar:"Lifter"},
  {date:"2026-03-11",avgRate:0.94,totalLbs:501.3,cultivar:"Lifter"},
  {date:"2026-03-12",avgRate:0.86,totalLbs:183.8,cultivar:"Lifter"},
  {date:"2026-03-13",avgRate:0.78,totalLbs:178.6,cultivar:"Lifter"},
  {date:"2026-03-16",avgRate:1.00,totalLbs:191.9,cultivar:"Lifter"},
  {date:"2026-03-17",avgRate:0.92,totalLbs:189.7,cultivar:"Unknown"},
  {date:"2026-03-18",avgRate:1.05,totalLbs:245.8,cultivar:"Lifter"},
  {date:"2026-03-19",avgRate:0.98,totalLbs:219.7,cultivar:"Lifter"},
  {date:"2026-03-20",avgRate:1.03,totalLbs:197.2,cultivar:"Lifter"},
  {date:"2026-03-23",avgRate:1.05,totalLbs:154.6,cultivar:"Unknown"},
  {date:"2026-03-24",avgRate:0.97,totalLbs:195.9,cultivar:"Lifter"},
  {date:"2026-03-25",avgRate:0.89,totalLbs:206.4,cultivar:"Lifter"},
  {date:"2026-03-26",avgRate:0.83,totalLbs:157,cultivar:"Platinum OG"},
  {date:"2026-03-27",avgRate:0.97,totalLbs:207.9,cultivar:"Lifter"},
  {date:"2026-03-30",avgRate:0.67,totalLbs:119,cultivar:"Lifter"},
  {date:"2026-03-31",avgRate:0.31,totalLbs:157.7,cultivar:"Unknown"}
];

// 7-day rolling avg target per cultivar
function calcDynamicTargets(days) {
  return days.map((day, idx) => {
    const cultivar = day.cultivar;
    const priorSame = [];
    for (let j = 0; j < idx; j++) {
      if (days[j].cultivar === cultivar && days[j].totalLbs > 0) {
        priorSame.push(days[j].avgRate);
      }
    }
    const window = priorSame.slice(-7);
    if (window.length === 0) return null;
    return +(window.reduce((s, v) => s + v, 0) / window.length).toFixed(3);
  });
}

const dynamicTargets = calcDynamicTargets(allDays);

const allWorking = allDays.map((d, i) => ({ ...d, target: dynamicTargets[i] }));
const febData = allWorking.filter(d => d.date.startsWith('2026-02'));
const marData = allWorking.filter(d => d.date.startsWith('2026-03'));

function shortDate(d) {
  const p = d.split('-');
  return parseInt(p[1]) + '/' + parseInt(p[2]);
}

function monthlyAvg(data) {
  return (data.reduce((s, d) => s + d.avgRate, 0) / data.length).toFixed(2);
}

const BAR_WIDTH = 180; // px per bar for readable spacing and all labels visible

function buildChart(canvasId, avgId, monthLabel, data) {
  const avg = monthlyAvg(data);
  document.getElementById(avgId).textContent = monthLabel + ' Avg: ' + avg + ' lbs/hr';

  const canvas = document.getElementById(canvasId);
  canvas.width = Math.max(data.length * BAR_WIDTH, 800);

  const labels = data.map(d => shortDate(d.date));
  const rates = data.map(d => d.avgRate);
  const targets = data.map(d => d.target);
  const colors = data.map(d => {
    if (d.target === null) return '#78909C';
    return d.avgRate >= d.target ? '#4CAF50' : '#E53935';
  });

  const allVals = [...rates, ...targets.filter(t => t !== null)];
  const dataMax = Math.max(...allVals);
  const yMax = Math.ceil((dataMax + 0.15) * 10) / 10;

  // Trend line
  const n = rates.length;
  let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
  for (let i = 0; i < n; i++) {
    sumX += i; sumY += rates[i]; sumXY += i * rates[i]; sumX2 += i * i;
  }
  const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  const trend = rates.map((_, i) => +(slope * i + intercept).toFixed(3));

  const ctx = canvas.getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Avg Rate (lbs/hr)',
          data: rates,
          backgroundColor: colors,
          borderColor: colors,
          borderWidth: 1,
          order: 2
        },
        {
          label: '7-Day Cultivar Target',
          data: targets,
          type: 'line',
          borderColor: '#FF9800',
          borderDash: [6, 4],
          borderWidth: 2,
          pointRadius: 3,
          pointBackgroundColor: '#FF9800',
          fill: false,
          order: 1,
          spanGaps: true
        },
        {
          label: 'Trend',
          data: trend,
          type: 'line',
          borderColor: '#1565C0',
          borderDash: [4, 3],
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
          order: 0
        }
      ]
    },
    options: {
      responsive: false,
      maintainAspectRatio: false,
      layout: {
        padding: { top: 30, right: 40, bottom: 10, left: 10 }
      },
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 } } },
        datalabels: {
          display: function(ctx) { return ctx.datasetIndex === 0; },
          anchor: 'end',
          align: 'top',
          font: { size: 10, weight: 'bold' },
          formatter: v => v.toFixed(2)
        }
      },
      scales: {
        x: {
          type: 'category',
          ticks: { 
            font: { size: 10 }, 
            maxRotation: 45, 
            minRotation: 0, 
            autoSkip: false,
            callback: function(val, index) {
              return this.getLabelForValue(val);
            }
          },
          grid: { display: false }
        },
        y: {
          min: 0,
          max: yMax,
          ticks: { font: { size: 11 }, stepSize: 0.1 },
          title: { display: true, text: 'Rate (lbs/hr)', font: { size: 12 } }
        }
      }
    },
    plugins: [ChartDataLabels]
  });
}

buildChart('febChart', 'febAvg', 'Feb', febData);
</script>
<script>setTimeout(() => { document.body.classList.add('ready'); }, 2000);</script>
</body>
</html>
