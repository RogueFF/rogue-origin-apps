<!DOCTYPE html>
<html><head><title>Supersack Backfill</title></head>
<body style="font-family:'JetBrains Mono',monospace;background:#141816;color:#e8e4dc;padding:20px;max-width:700px;margin:0 auto">
<h2 style="color:#e4aa4f">Supersack Data Backfill</h2>
<p style="color:#668971;font-size:13px">Pulls historical supersack changes + biomass/trim from pool API, production data from D1, and backfills supersack_entries table.</p>
<button id="run" style="padding:14px 28px;font-size:15px;cursor:pointer;background:linear-gradient(135deg,#e4aa4f,#d49a3f);color:#1a1f16;border:none;border-radius:8px;font-weight:700">Run Backfill</button>
<pre id="log" style="margin-top:20px;white-space:pre-wrap;font-size:12px;line-height:1.6;background:rgba(26,30,27,0.85);padding:16px;border-radius:8px;border:1px solid rgba(102,137,113,0.15)"></pre>
<script>
const POOL_API = 'https://rogue-origin-api.roguefamilyfarms.workers.dev/api/pool';
const PROD_API = 'https://rogue-origin-api.roguefamilyfarms.workers.dev/api/production';
const SS_API = 'https://rogue-origin-api.roguefamilyfarms.workers.dev/api/supersack';
const log = (msg) => { const el = document.getElementById('log'); el.textContent += msg + '\n'; el.scrollTop = el.scrollHeight; };

document.getElementById('run').onclick = async () => {
  document.getElementById('run').disabled = true;
  document.getElementById('run').textContent = 'Running...';

  try {
    // 1. Fetch supersack changes
    log('1. Fetching supersack changes from pool API...');
    const ssRes = await fetch(`${POOL_API}?action=get_supersack_recent_changes`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
    }).then(r => r.json());
    const supersack_changes = ssRes.entries || [];
    log(`   Found ${supersack_changes.length} supersack entries`);

    if (supersack_changes.length > 0) {
      log(`   Sample: ${JSON.stringify(supersack_changes[0], null, 2).substring(0, 200)}`);
    }

    // 2. Fetch pool changes (biomass/trim)
    log('\n2. Fetching pool changes (biomass/trim)...');
    const poolRes = await fetch(`${POOL_API}?action=get_recent_changes`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
    }).then(r => r.json());
    const allPoolEntries = poolRes.entries || [];
    const pool_changes = allPoolEntries.filter(e => (e.note || '').includes('[Supersack Tracker]'));
    log(`   Found ${allPoolEntries.length} total pool entries, ${pool_changes.length} from Supersack Tracker`);

    if (pool_changes.length > 0) {
      log(`   Sample: ${JSON.stringify(pool_changes[0], null, 2).substring(0, 200)}`);
    }

    // 3. Get unique dates from supersack changes
    const dates = [...new Set(supersack_changes
      .filter(e => e.timestamp)
      .map(e => new Date(e.timestamp).toISOString().slice(0, 10))
    )].sort();
    log(`\n3. Unique dates found: ${dates.length}`);
    dates.forEach(d => log(`   ${d}`));

    // 4. Fetch production data for each date
    log('\n4. Fetching production data per date...');
    const production_data = [];
    for (const date of dates) {
      try {
        const prodRes = await fetch(`${PROD_API}?action=getProduction&date=${date}`).then(r => r.json());
        const rows = prodRes.production || [];
        // Sum tops/smalls across all time slots and both lines
        let tops = 0, smalls = 0;
        rows.forEach(r => {
          tops += (r.tops1 || 0) + (r.tops2 || 0);
          smalls += (r.smalls1 || 0) + (r.smalls2 || 0);
        });
        if (tops > 0 || smalls > 0) {
          production_data.push({ date, tops_lbs: tops, smalls_lbs: smalls });
          log(`   ${date}: tops=${tops.toFixed(1)}, smalls=${smalls.toFixed(1)} (${rows.length} slots)`);
        } else {
          log(`   ${date}: no production data`);
        }
      } catch (e) {
        log(`   ${date}: ERROR - ${e.message}`);
      }
    }

    // 5. Send backfill
    log(`\n5. Sending backfill to D1...`);
    log(`   supersack_changes: ${supersack_changes.length}`);
    log(`   pool_changes: ${pool_changes.length}`);
    log(`   production_data: ${production_data.length}`);

    const result = await fetch(`${SS_API}?action=backfill`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ supersack_changes, pool_changes, production_data })
    }).then(r => r.json());

    log('\n--- RESULT ---');
    log(JSON.stringify(result, null, 2));

    // 6. Verify
    log('\n6. Verifying data...');
    const verifyRes = await fetch(`${SS_API}?action=history&start=2025-01-01&end=2026-12-31`).then(r => r.json());
    log(`   Total entries in D1: ${(verifyRes.entries || []).length}`);
    (verifyRes.entries || []).forEach(e => {
      log(`   ${e.date} | ${e.strain} | ${e.sacks_opened} sacks | tops=${e.tops_lbs.toFixed(1)} | smalls=${e.smalls_lbs.toFixed(1)} | bio=${e.biomass_lbs.toFixed(1)} | trim=${e.trim_lbs.toFixed(1)} | waste=${e.waste_lbs.toFixed(1)}`);
    });

    log('\n✓ Done! You can delete this page now.');
  } catch (e) {
    log(`\nFATAL ERROR: ${e.message}`);
    log(e.stack);
  }

  document.getElementById('run').disabled = false;
  document.getElementById('run').textContent = 'Run Again';
};
</script>
</body></html>
