<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Order Photo — Rogue Origin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green:#668971; --dark:#1f2a20; --gold:#e4aa4f; --paper:#faf8f5; --muted:#6b7468; }
  body { font-family: system-ui, 'Segoe UI', sans-serif; background: var(--paper); color: var(--dark);
         min-height: 100vh; padding: 18px 16px calc(28px + env(safe-area-inset-bottom)); }
  .wrap { max-width: 560px; margin: 0 auto; }
  header { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
  header img { width:40px; height:40px; border-radius:50%; }
  header h1 { font-size:18px; font-weight:800; letter-spacing:.3px; }
  .card { background:#fff; border:1px solid #e7e3dc; border-radius:14px; padding:18px; margin-bottom:16px;
          box-shadow:0 1px 3px rgba(0,0,0,.04); }
  label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
          font-weight:700; margin-bottom:7px; }
  .order-row { display:flex; gap:8px; }
  input#orderInput { flex:1; font-size:18px; padding:13px 14px; border:2px solid #d8d3c8; border-radius:10px;
                     background:var(--paper); color:var(--dark); }
  input#orderInput:focus { outline:none; border-color:var(--green); }
  .order-set { font-size:30px; font-weight:800; color:var(--dark); }
  .order-set small { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.5px;
                     color:var(--muted); font-weight:700; margin-bottom:2px; }
  button { font-family:inherit; cursor:pointer; border:none; border-radius:10px; font-weight:800; }
  .btn-secondary { background:var(--green); color:#fff; padding:13px 18px; font-size:16px; }
  .btn-shoot { width:100%; background:var(--gold); color:var(--dark); font-size:22px; padding:20px;
               border-radius:14px; display:flex; align-items:center; justify-content:center; gap:12px; }
  .btn-shoot:disabled { opacity:.45; cursor:not-allowed; }
  .btn-shoot .cam { font-size:26px; }
  .change { background:none; color:var(--green); font-weight:700; font-size:13px; padding:6px 0; text-decoration:underline; }
  #status { margin-top:12px; font-size:15px; font-weight:600; min-height:22px; }
  .ok { color:#2e7d4f; } .err { color:#bd4a28; } .busy { color:var(--muted); }
  .gallery-head { display:flex; align-items:baseline; justify-content:space-between; margin:6px 2px 10px; }
  .gallery-head h2 { font-size:14px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
  .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }
  .grid a { display:block; aspect-ratio:1; border-radius:10px; overflow:hidden; border:1px solid #e7e3dc; background:#eee; }
  .grid img { width:100%; height:100%; object-fit:cover; display:block; }
  .empty { color:var(--muted); font-size:14px; padding:8px 2px; }
  .hint { color:var(--muted); font-size:13px; margin-top:6px; line-height:1.4; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="../assets/ro-logo-horizontal.png" alt="">
    <h1>Order Photo</h1>
  </header>

  <div class="card">
    <div id="orderEntry">
      <label>Which order?</label>
      <div class="order-row">
        <input id="orderInput" type="text" inputmode="text" autocapitalize="characters"
               placeholder="e.g. 1042" autocomplete="off">
        <button class="btn-secondary" id="setBtn">Set</button>
      </div>
      <p class="hint">Scan an order's QR to skip this step — it fills the order in automatically.</p>
    </div>

    <div id="orderShown" style="display:none">
      <div class="order-set"><small>Order</small><span id="orderLabel">—</span></div>
      <button class="change" id="changeBtn">change order</button>
    </div>
  </div>

  <button class="btn-shoot" id="shootBtn" disabled>
    <span class="cam">📷</span><span>Take Photo</span>
  </button>
  <input type="file" id="cam" accept="image/*" capture="environment" hidden>
  <div id="status"></div>

  <div class="card" id="galleryCard" style="display:none; margin-top:18px">
    <div class="gallery-head">
      <h2>Photos on this order</h2>
      <span id="count" class="empty"></span>
    </div>
    <div class="grid" id="grid"></div>
    <p class="empty" id="galleryEmpty">No photos yet — take the first one.</p>
  </div>
</div>

<script>
  var API = 'https://rogue-origin-api.roguefamilyfarms.workers.dev/api/media';
  var order = '';

  function $(id){ return document.getElementById(id); }
  function clean(s){ return String(s||'').replace(/[^a-zA-Z0-9_-]/g,'').slice(0,40); }
  function setStatus(msg, cls){ var s=$('status'); s.textContent=msg||''; s.className=cls||''; }

  function setOrder(v){
    order = clean(v);
    if(!order){ setStatus('Enter an order number first.', 'err'); return; }
    $('orderEntry').style.display='none';
    $('orderShown').style.display='block';
    $('orderLabel').textContent = order;
    $('shootBtn').disabled = false;
    $('galleryCard').style.display='block';
    setStatus('');
    loadGallery();
  }
  function changeOrder(){
    $('orderEntry').style.display='block';
    $('orderShown').style.display='none';
    $('shootBtn').disabled = true;
    $('galleryCard').style.display='none';
    $('orderInput').value = order;
    $('orderInput').focus();
  }

  $('setBtn').onclick = function(){ setOrder($('orderInput').value); };
  $('orderInput').addEventListener('keydown', function(e){ if(e.key==='Enter') setOrder(this.value); });
  $('changeBtn').onclick = changeOrder;
  $('shootBtn').onclick = function(){ $('cam').click(); };
  $('cam').addEventListener('change', function(){ if(this.files && this.files[0]) upload(this.files[0]); this.value=''; });

  function upload(file){
    if(!order){ setStatus('Set an order first.', 'err'); return; }
    setStatus('Uploading…', 'busy');
    $('shootBtn').disabled = true;
    var fd = new FormData();
    fd.append('file', file);
    fd.append('folder', 'orders/' + order);
    fetch(API + '?action=upload', { method:'POST', body:fd })
      .then(function(r){ return r.json(); })
      .then(function(r){
        if(r.success){ setStatus('Saved ✓  to order ' + order, 'ok'); loadGallery(); }
        else { setStatus('Upload failed: ' + (r.error || 'unknown'), 'err'); }
      })
      .catch(function(e){ setStatus('Upload error: ' + e.message, 'err'); })
      .finally(function(){ $('shootBtn').disabled = false; });
  }

  function loadGallery(){
    fetch(API + '?action=list&prefix=' + encodeURIComponent('orders/' + order))
      .then(function(r){ return r.json(); })
      .then(function(r){
        var grid = $('grid'), empty = $('galleryEmpty'), count = $('count');
        grid.innerHTML = '';
        var items = (r && r.items) || [];
        count.textContent = items.length ? (items.length + (items.length===1?' photo':' photos')) : '';
        empty.style.display = items.length ? 'none' : 'block';
        items.forEach(function(it){
          var a = document.createElement('a');
          a.href = it.url; a.target = '_blank'; a.rel = 'noopener';
          var img = document.createElement('img');
          img.src = it.url; img.alt = 'order photo'; img.loading = 'lazy';
          a.appendChild(img); grid.appendChild(a);
        });
      })
      .catch(function(){ /* non-critical */ });
  }

  // Dynamic QR: ?order=1042 pre-fills + locks the order. Static QR: no param -> ask for it.
  (function init(){
    var p = new URLSearchParams(location.search).get('order');
    if(p){ setOrder(p); } else { $('orderInput').focus(); }
  })();
</script>
</body>
</html>
