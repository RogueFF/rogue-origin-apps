    // ── Translation helper ──
    function t(key) {
      return translations[appLang][key] || translations['en'][key] || key;
    }

    function otherLang() { return appLang === 'en' ? 'es' : 'en'; }

    function toggleLang() {
      appLang = appLang === 'en' ? 'es' : 'en';
      document.querySelector('.lang-toggle').textContent = appLang.toUpperCase();
      document.documentElement.lang = appLang;
      applyTranslations();
      updateWizardLabels();
      renderCardList();
      // Re-render preview if on step 6
      if (currentStep === 6) syncCardDataFromForm();
    }

    function applyTranslations() {
      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (translations[appLang][key]) {
          el.textContent = translations[appLang][key];
        }
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
        var key = el.getAttribute('data-i18n-placeholder');
        if (translations[appLang][key]) {
          el.placeholder = translations[appLang][key];
        }
      });
    }

    // ── Screen Management ──
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
      document.getElementById(name + 'Screen').classList.add('active');
      window.scrollTo(0, 0);
      if (name === 'start') loadCards();
    }

    // ── Card List / Browse ──
    async function loadCards() {
      try {
        var res = await fetch(API_URL + '?action=getCards');
        var data = await res.json();
        allCards = data.cards || [];
      } catch (e) {
        allCards = [];
        console.error('Failed to load cards:', e);
      }
      renderCardList();
    }

    function setFilter(f) {
      activeFilter = f;
      document.querySelectorAll('.filter-chip').forEach(function(c) {
        c.classList.toggle('active', c.getAttribute('data-filter') === f);
      });
      renderCardList();
    }

    function renderCardList() {
      var list = document.getElementById('cardList');
      var filtered = allCards;

      if (activeFilter === 'needs_review') {
        filtered = allCards.filter(function(c) { return c.status === 'needs_review'; });
      } else if (activeFilter !== 'all') {
        filtered = allCards.filter(function(c) { return c.frequency === activeFilter; });
      }

      if (filtered.length === 0) {
        var msg = allCards.length === 0 ? t('emptyState') : t('emptyFilter');
        var sub = allCards.length === 0 ? t('emptyStateSub') : '';
        list.innerHTML = '<div class="empty-state">' +
          '<div class="empty-state-icon">&#128203;</div>' +
          '<div class="empty-state-text">' + msg + '</div>' +
          (sub ? '<div style="color:var(--text-muted);font-size:14px;margin-top:8px;">' + sub + '</div>' : '') +
          '</div>';
        return;
      }

      list.innerHTML = filtered.map(function(card) {
        var title = getCardField(card, 'title');
        var freqLabel = t('filter' + capitalize(card.frequency));
        var statusLabel = card.status === 'approved' ? t('approved') : t('needsReview');
        var statusClass = card.status === 'approved' ? 'badge-approved' : 'badge-needs-review';
        var freqClass = 'badge-' + card.frequency;

        return '<div class="card-row freq-' + card.frequency + '" onclick="viewCard(\'' + card.id + '\')">' +
          '<div class="card-row-info">' +
            '<div class="card-row-title">' + escapeHtml(title) + '</div>' +
            '<div class="card-row-equip">' + escapeHtml(card.equipment) + '</div>' +
          '</div>' +
          '<div class="card-row-badges">' +
            '<span class="badge ' + freqClass + '">' + freqLabel + '</span>' +
            '<span class="badge ' + statusClass + '">' + statusLabel + '</span>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function getCardField(card, field) {
      var primary = card[field + '_' + appLang];
      var fallback = card[field + '_' + otherLang()];
      return primary || fallback || '';
    }

    // ── New Card Wizard ──
    function startNewCard() {
      editingCard = null;
      cardData = {
        frequency: 'daily',
        title_en: '', title_es: '',
        equipment: '', shift: '',
        desc_en: '', desc_es: '',
        instr_en: '', instr_es: '',
        desc_image: '', instr_image: '',
        ppe: [], hazards: [],
        materials_en: '', materials_es: '',
        warning_en: '', warning_es: '',
        ppe_other: '', hazard_other: '',
      };
      currentStep = 1;
      showScreen('wizard');
      updateWizard();
      loadEquipmentList();
    }

    function editCard(card) {
      editingCard = card;
      cardData = {
        id: card.id,
        frequency: card.frequency || 'daily',
        title_en: card.title_en || '', title_es: card.title_es || '',
        equipment: card.equipment || '', shift: card.shift || '',
        desc_en: card.desc_en || '', desc_es: card.desc_es || '',
        instr_en: card.instr_en || '', instr_es: card.instr_es || '',
        desc_image: card.desc_image || '', instr_image: card.instr_image || '',
        ppe: Array.isArray(card.ppe) ? card.ppe.slice() : [],
        hazards: Array.isArray(card.hazards) ? card.hazards.slice() : [],
        materials_en: card.materials_en || '', materials_es: card.materials_es || '',
        warning_en: card.warning_en || '', warning_es: card.warning_es || '',
        ppe_other: card.ppe_other || '', hazard_other: card.hazard_other || '',
      };
      currentStep = 2; // Skip frequency for edit
      showScreen('wizard');
      populateFormFromCardData();
      updateWizard();
      loadEquipmentList();
    }

    function duplicateCard(card) {
      editingCard = null;
      cardData = {
        frequency: card.frequency || 'daily',
        title_en: card.title_en || '', title_es: card.title_es || '',
        equipment: card.equipment || '', shift: card.shift || '',
        desc_en: card.desc_en || '', desc_es: card.desc_es || '',
        instr_en: card.instr_en || '', instr_es: card.instr_es || '',
        desc_image: card.desc_image || '', instr_image: card.instr_image || '',
        ppe: Array.isArray(card.ppe) ? card.ppe.slice() : [],
        hazards: Array.isArray(card.hazards) ? card.hazards.slice() : [],
        materials_en: card.materials_en || '', materials_es: card.materials_es || '',
        warning_en: card.warning_en || '', warning_es: card.warning_es || '',
        ppe_other: card.ppe_other || '', hazard_other: card.hazard_other || '',
      };
      currentStep = 2;
      showScreen('wizard');
      populateFormFromCardData();
      updateWizard();
      loadEquipmentList();
    }

    async function loadEquipmentList() {
      try {
        var res = await fetch(API_URL + '?action=getEquipment');
        var data = await res.json();
        var dl = document.getElementById('equipmentList');
        dl.innerHTML = (data.equipment || []).map(function(e) {
          return '<option value="' + escapeHtml(e) + '">';
        }).join('');
      } catch (e) {
        console.error('Failed to load equipment list:', e);
      }
    }

    // ── Wizard Navigation ──
    function updateWizard() {
      // Update progress dots
      var dots = document.querySelectorAll('.progress-dot');
      var freqColor = FREQ_COLORS[cardData.frequency] || FREQ_COLORS.daily;

      dots.forEach(function(dot, i) {
        var step = i + 1;
        dot.classList.remove('current', 'completed');
        dot.style.background = '';
        dot.style.boxShadow = '';

        if (step < currentStep) {
          dot.classList.add('completed');
          dot.style.background = freqColor;
        } else if (step === currentStep) {
          dot.classList.add('current');
          dot.style.background = freqColor;
          dot.style.boxShadow = '0 0 0 3px ' + freqColor + '44';
        }
      });

      // Show current step
      for (var i = 1; i <= 6; i++) {
        var el = document.getElementById('step' + i);
        if (el) el.classList.toggle('active', i === currentStep);
      }

      // Update step label
      updateWizardLabels();

      // Render step-specific content
      if (currentStep === 4) renderCheckboxGrids();
      if (currentStep === 5) updateWarningPreview();
      if (currentStep === 6) renderPreview();

      // Update desktop live preview
      updateDesktopPreview();

      window.scrollTo(0, 0);
    }

    function updateWizardLabels() {
      var labelEl = document.getElementById('wizardStepLabel');
      var subEl = document.getElementById('wizardStepSub');
      if (labelEl) labelEl.textContent = t('step' + currentStep + 'Label');
      if (subEl) subEl.textContent = t('step' + currentStep + 'Sub');

      // Update bilingual field labels
      var pri = appLang;
      var sec = otherLang();

      setTextById('titleLabelPrimary', t('title' + pri.toUpperCase()));
      setTextById('titleLabelSecondary', t('title' + sec.toUpperCase()));
      setTextById('descLabelPrimary', t('desc' + pri.toUpperCase()));
      setTextById('descLabelSecondary', t('desc' + sec.toUpperCase()));
      setTextById('instrLabelPrimary', t('instr' + pri.toUpperCase()));
      setTextById('instrLabelSecondary', t('instr' + sec.toUpperCase()));
      setTextById('matLabelPrimary', t('mat' + pri.toUpperCase()));
      setTextById('matLabelSecondary', t('mat' + sec.toUpperCase()));
      setTextById('warnLabelPrimary', t('warn' + pri.toUpperCase()));
      setTextById('warnLabelSecondary', t('warn' + sec.toUpperCase()));
    }

    function setTextById(id, text) {
      var el = document.getElementById(id);
      if (el) el.textContent = text;
    }

    function selectFrequency(freq) {
      cardData.frequency = freq;
      nextStep();
    }

    function nextStep() {
      if (currentStep >= 2 && currentStep <= 5) syncCardDataFromForm();
      if (currentStep < 6) {
        currentStep++;
        if (currentStep === 2 || currentStep === 3 || currentStep === 5) populateFormFromCardData();
        updateWizard();
      }
    }

    function prevStep() {
      if (currentStep >= 2 && currentStep <= 5) syncCardDataFromForm();
      if (currentStep > 1) {
        currentStep--;
        if (currentStep === 2 || currentStep === 3 || currentStep === 5) populateFormFromCardData();
        updateWizard();
      }
    }

    function wizardBack() {
      if (currentStep === 1) {
        showScreen('start');
      } else {
        prevStep();
      }
    }

    // ── Form Sync ──
    function syncCardDataFromForm() {
      var pri = appLang;
      var sec = otherLang();

      if (currentStep === 2) {
        cardData.equipment = val('fieldEquipment');
        cardData.shift = val('fieldShift');
        cardData['title_' + pri] = val('fieldTitlePrimary');
        cardData['title_' + sec] = val('fieldTitleSecondary');
      }
      if (currentStep === 3) {
        cardData['desc_' + pri] = val('fieldDescPrimary');
        cardData['desc_' + sec] = val('fieldDescSecondary');
        cardData['instr_' + pri] = val('fieldInstrPrimary');
        cardData['instr_' + sec] = val('fieldInstrSecondary');
      }
      if (currentStep === 4) {
        cardData.ppe_other = val('ppeOtherText');
        cardData.hazard_other = val('hazardOtherText');
      }
      if (currentStep === 5) {
        cardData['materials_' + pri] = val('fieldMatPrimary');
        cardData['materials_' + sec] = val('fieldMatSecondary');
        cardData['warning_' + pri] = val('fieldWarnPrimary');
        cardData['warning_' + sec] = val('fieldWarnSecondary');
      }
    }

    function populateFormFromCardData() {
      var pri = appLang;
      var sec = otherLang();

      if (currentStep === 2) {
        setVal('fieldEquipment', cardData.equipment);
        setVal('fieldShift', cardData.shift);
        setVal('fieldTitlePrimary', cardData['title_' + pri]);
        setVal('fieldTitleSecondary', cardData['title_' + sec]);
      }
      if (currentStep === 3) {
        setVal('fieldDescPrimary', cardData['desc_' + pri]);
        setVal('fieldDescSecondary', cardData['desc_' + sec]);
        setVal('fieldInstrPrimary', cardData['instr_' + pri]);
        setVal('fieldInstrSecondary', cardData['instr_' + sec]);
        // Restore image previews
        if (cardData.desc_image) showImagePreview('desc', cardData.desc_image);
        else hideImagePreview('desc');
        if (cardData.instr_image) showImagePreview('instr', cardData.instr_image);
        else hideImagePreview('instr');
      }
      if (currentStep === 5) {
        setVal('fieldMatPrimary', cardData['materials_' + pri]);
        setVal('fieldMatSecondary', cardData['materials_' + sec]);
        setVal('fieldWarnPrimary', cardData['warning_' + pri]);
        setVal('fieldWarnSecondary', cardData['warning_' + sec]);
        updateWarningPreview();
      }
    }

    function val(id) { var el = document.getElementById(id); return el ? el.value : ''; }
    function setVal(id, v) { var el = document.getElementById(id); if (el) el.value = v || ''; }

    // ── PPE & Hazards Checkbox Grids ──
    function renderCheckboxGrids() {
      var ppeGrid = document.getElementById('ppeGrid');
      ppeGrid.innerHTML = ALL_PPE.map(function(name) {
        var checked = cardData.ppe.indexOf(name) >= 0;
        var label = t(PPE_KEYS[name] || name);
        return '<div class="checkbox-item' + (checked ? ' checked' : '') + '" onclick="togglePPE(this, \'' + name + '\')">' +
          '<div class="checkbox-box">' + (checked ? '&#10003;' : '') + '</div>' +
          '<div class="checkbox-label">' + escapeHtml(label) + '</div>' +
        '</div>';
      }).join('');

      var hazGrid = document.getElementById('hazardsGrid');
      hazGrid.innerHTML = ALL_HAZARDS.map(function(name) {
        var checked = cardData.hazards.indexOf(name) >= 0;
        var label = t(HAZARD_KEYS[name] || name);
        return '<div class="checkbox-item' + (checked ? ' checked hazard-checked' : '') + '" onclick="toggleHazard(this, \'' + escapeAttr(name) + '\')">' +
          '<div class="checkbox-box">' + (checked ? '&#10003;' : '') + '</div>' +
          '<div class="checkbox-label">' + escapeHtml(label) + '</div>' +
        '</div>';
      }).join('');

      // Restore "Other" specify inputs
      updateOtherVisibility('ppe');
      updateOtherVisibility('hazard');
      setVal('ppeOtherText', cardData.ppe_other);
      setVal('hazardOtherText', cardData.hazard_other);
    }

    function togglePPE(el, name) {
      var idx = cardData.ppe.indexOf(name);
      if (idx >= 0) {
        cardData.ppe.splice(idx, 1);
        el.classList.remove('checked');
        el.querySelector('.checkbox-box').innerHTML = '';
      } else {
        cardData.ppe.push(name);
        el.classList.add('checked');
        el.querySelector('.checkbox-box').innerHTML = '&#10003;';
      }
      updateOtherVisibility('ppe');
    }

    function toggleHazard(el, name) {
      var idx = cardData.hazards.indexOf(name);
      if (idx >= 0) {
        cardData.hazards.splice(idx, 1);
        el.classList.remove('checked', 'hazard-checked');
        el.querySelector('.checkbox-box').innerHTML = '';
      } else {
        cardData.hazards.push(name);
        el.classList.add('checked', 'hazard-checked');
        el.querySelector('.checkbox-box').innerHTML = '&#10003;';
      }
      updateOtherVisibility('hazard');
    }

    function updateOtherVisibility(type) {
      if (type === 'ppe') {
        var show = cardData.ppe.indexOf('Other') >= 0;
        var el = document.getElementById('ppeOtherSpecify');
        if (el) el.classList.toggle('visible', show);
        if (!show) { cardData.ppe_other = ''; setVal('ppeOtherText', ''); }
      } else {
        var show = cardData.hazards.indexOf('Other') >= 0;
        var el = document.getElementById('hazardOtherSpecify');
        if (el) el.classList.toggle('visible', show);
        if (!show) { cardData.hazard_other = ''; setVal('hazardOtherText', ''); }
      }
    }

    // ── Warning Preview ──
    function updateWarningPreview() {
      var pri = val('fieldWarnPrimary');
      var sec = val('fieldWarnSecondary');
      var text = pri || sec || '';
      var preview = document.getElementById('warningPreview');
      if (text) {
        preview.textContent = text;
        preview.classList.add('visible');
      } else {
        preview.classList.remove('visible');
      }
    }

    // ── Translation ──
    async function translateField(field) {
      var pri = appLang;
      var sec = otherLang();

      var fieldMap = {
        title: { primary: 'fieldTitlePrimary', secondary: 'fieldTitleSecondary' },
        desc: { primary: 'fieldDescPrimary', secondary: 'fieldDescSecondary' },
        instr: { primary: 'fieldInstrPrimary', secondary: 'fieldInstrSecondary' },
        materials: { primary: 'fieldMatPrimary', secondary: 'fieldMatSecondary' },
        warning: { primary: 'fieldWarnPrimary', secondary: 'fieldWarnSecondary' },
      };

      var map = fieldMap[field];
      if (!map) return;

      var sourceText = val(map.primary);
      if (!sourceText.trim()) return;

      // Find the translate button near the primary field
      var primaryEl = document.getElementById(map.primary);
      var btn = primaryEl ? primaryEl.parentElement.querySelector('.translate-btn') : null;

      try {
        if (btn) { btn.classList.add('loading'); btn.textContent = ''; }

        var res = await fetch(API_URL + '?action=translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: sourceText, from: pri, to: sec })
        });
        var data = await res.json();
        if (data.translated) {
          setVal(map.secondary, data.translated);
        }
      } catch (e) {
        showToast(t('errorTranslating'));
        console.error('Translation failed:', e);
      } finally {
        if (btn) { btn.classList.remove('loading'); btn.textContent = '\u{1F310}'; }
      }
    }

    // ── T-Card Rendering ──
    function getFreqColorClass(freq) {
      return 'freq-color-' + (freq || 'daily');
    }

    function getFreqLabel(freq) {
      var map = { daily: 'dailyTPM', weekly: 'weeklyTPM', monthly: 'monthlyTPM' };
      return t(map[freq] || 'dailyTPM');
    }

    function buildFront(card) {
      var freq = card.frequency || 'daily';
      var colorClass = getFreqColorClass(freq);
      var title = getCardField(card, 'title');
      var desc = getCardField(card, 'desc');
      var instr = getCardField(card, 'instr');
      var warning = getCardField(card, 'warning');
      var freqLabel = getFreqLabel(freq);

      var warningHtml = warning
        ? '<div class="tcard-warning-bar">' + escapeHtml(warning) + '</div>'
        : '';

      var descImg = card.desc_image
        ? '<div class="tcard-section-image"><img src="' + escapeHtml(card.desc_image) + '"></div>'
        : '';

      var instrImg = card.instr_image
        ? '<div class="tcard-section-image"><img src="' + escapeHtml(card.instr_image) + '"></div>'
        : '';

      return '<div class="tcard-front">' +
        '<div class="tcard-header-bar ' + colorClass + '">' + escapeHtml(freqLabel) + '</div>' +
        '<div class="tcard-component-bar ' + colorClass + '">' + escapeHtml(title) + '</div>' +
        '<div class="tcard-meta-row">' +
          '<div class="tcard-meta-cell"><strong>Equip. #</strong> ' + escapeHtml(card.equipment || '') + '</div>' +
          '<div class="tcard-meta-cell"><strong>Shift:</strong> ' + escapeHtml(card.shift || '') + '</div>' +
        '</div>' +
        '<div class="tcard-section">' +
          '<div class="tcard-section-label">' + t('description') + '</div>' +
          '<div class="tcard-section-text">' + escapeHtml(desc) + '</div>' +
          descImg +
        '</div>' +
        '<div class="tcard-section tcard-instruction">' +
          '<div class="tcard-section-label">' + t('instruction') + '</div>' +
          '<div class="tcard-section-text">' + escapeHtml(instr) + '</div>' +
          instrImg +
        '</div>' +
        warningHtml +
        '<div class="tcard-yellow-tag"><span class="tag-icon"></span> ' + t('yellowTag') + '</div>' +
        '<div class="tcard-footer-bar">' + escapeHtml(card.id || 'NEW') + ' &bull; v1.0 &bull; Rogue Origin</div>' +
      '</div>';
    }

    function buildBack(card) {
      var freq = card.frequency || 'daily';
      var colorClass = getFreqColorClass(freq);
      var ppeList = Array.isArray(card.ppe) ? card.ppe : [];
      var hazardList = Array.isArray(card.hazards) ? card.hazards : [];
      var materials = getCardField(card, 'materials');

      // PPE
      var ppeHtml = '';
      ALL_PPE.forEach(function(name) {
        var checked = ppeList.indexOf(name) >= 0;
        var mark = checked ? '\u2713' : '';
        var cls = checked ? ' checked' : '';
        var label = name;
        if (name === 'Other' && checked && card.ppe_other) label = 'Other: ' + card.ppe_other;
        ppeHtml += '<div class="ppe-item"><span class="ppe-check' + cls + '">' + mark + '</span> ' + escapeHtml(label) + '</div>';
      });

      // Hazards
      var hazHtml = '';
      ALL_HAZARDS.forEach(function(name) {
        var checked = hazardList.indexOf(name) >= 0;
        var mark = checked ? '\u2713' : '';
        var cls = checked ? ' checked' : '';
        var label = name;
        if (name === 'Other' && checked && card.hazard_other) label = 'Other: ' + card.hazard_other;
        hazHtml += '<div class="hazard-item"><span class="hazard-check' + cls + '">' + mark + '</span> ' + escapeHtml(label) + '</div>';
      });

      return '<div class="tcard-back">' +
        '<div class="tcard-back-header ' + colorClass + '">' + t('ppeRequirements') + '</div>' +
        '<div class="ppe-grid">' + ppeHtml + '</div>' +
        '<div class="hazard-section-header ' + colorClass + '">' + t('safetyHazards') + '</div>' +
        '<div class="hazard-grid">' + hazHtml + '</div>' +
        '<div class="materials-header ' + colorClass + '">' + t('materialsEquipment') + '</div>' +
        '<div class="materials-box">' + escapeHtml(materials) + '</div>' +
        '<div class="back-card-id">' + escapeHtml(card.id || 'NEW') + ' &bull; v1.0</div>' +
      '</div>';
    }

    // ── Preview (Step 6) ──
    function renderPreview() {
      syncCardDataFromForm();
      var container = document.getElementById('previewContent');
      if (previewSide === 'front') {
        container.innerHTML = buildFront(cardData);
      } else {
        container.innerHTML = buildBack(cardData);
      }
    }

    function showPreviewSide(side) {
      previewSide = side;
      document.querySelectorAll('#step6 .preview-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.textContent.toLowerCase().replace(/\s/g,'') === side ||
          (side === 'front' && tab === document.querySelector('#step6 .preview-tab:first-child')) ||
          (side === 'back' && tab === document.querySelector('#step6 .preview-tab:last-child')));
      });
      // Simpler: just use position
      var tabs = document.querySelectorAll('#step6 .preview-tab');
      tabs[0].classList.toggle('active', side === 'front');
      tabs[1].classList.toggle('active', side === 'back');
      renderPreview();
    }

    // ── Desktop Live Preview ──
    function updateDesktopPreview() {
      var container = document.getElementById('desktopPreviewContent');
      if (!container) return;
      // Only update if visible (desktop)
      var col = document.getElementById('wizardPreviewCol');
      if (!col || col.offsetParent === null) return;

      syncCardDataFromForm();
      if (desktopPreviewSide === 'front') {
        container.innerHTML = buildFront(cardData);
      } else {
        container.innerHTML = buildBack(cardData);
      }
    }

    function setDesktopPreviewSide(side) {
      desktopPreviewSide = side;
      var tabs = document.querySelectorAll('#wizardPreviewCol .preview-tab');
      if (tabs.length >= 2) {
        tabs[0].classList.toggle('active', side === 'front');
        tabs[1].classList.toggle('active', side === 'back');
      }
      updateDesktopPreview();
    }

    // ── Save ──
    async function saveCard(shouldPrint) {
      syncCardDataFromForm();

      var action = cardData.id ? 'updateCard' : 'createCard';
      var toastMsg = cardData.id ? t('cardUpdated') : t('cardSaved');

      try {
        var res = await fetch(API_URL + '?action=' + action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ card: cardData })
        });
        var data = await res.json();

        if (data.success) {
          showToast(toastMsg);
          if (data.id) cardData.id = data.id;

          if (shouldPrint) {
            printCard(cardData);
          }

          showScreen('start');
        } else {
          showToast(t('errorSaving'));
        }
      } catch (e) {
        showToast(t('errorSaving'));
        console.error('Save failed:', e);
      }
    }

    async function saveAndPrint() {
      await saveCard(true);
    }

    // ── Delete ──
    async function deleteCard(id) {
      if (!confirm(t('confirmDelete'))) return;
      try {
        var res = await fetch(API_URL + '?action=deleteCard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        });
        var data = await res.json();
        if (data.success) {
          showToast(t('cardDeleted'));
          showScreen('start');
        }
      } catch (e) {
        console.error('Delete failed:', e);
      }
    }

    // ── View Card ──
    function viewCard(id) {
      var card = allCards.find(function(c) { return c.id === id; });
      if (!card) return;
      viewingCard = card;
      viewSide = 'front';

      document.getElementById('viewTitle').textContent = getCardField(card, 'title');
      renderViewContent();

      // Status badge
      var statusBadge = document.getElementById('viewStatusBadge');
      var statusLabel = card.status === 'approved' ? t('approved') : t('needsReview');
      var statusClass = card.status === 'approved' ? 'badge-approved' : 'badge-needs-review';
      statusBadge.innerHTML = '<span class="badge ' + statusClass + '" style="font-size:13px;padding:6px 16px;">' + statusLabel + '</span>';

      // Action buttons
      var actions = document.getElementById('viewActions');
      var btns = '';
      btns += '<button class="btn-action" onclick="editCard(viewingCard)">' + t('edit') + '</button>';
      btns += '<button class="btn-action" onclick="duplicateCard(viewingCard)">' + t('duplicate') + '</button>';
      btns += '<button class="btn-action" onclick="printCard(viewingCard)">' + t('print') + '</button>';
      if (card.status === 'needs_review') {
        btns += '<button class="btn-action approve-btn" onclick="approveCard(\'' + card.id + '\')">' + t('approve') + '</button>';
      }
      btns += '<button class="btn-action danger" onclick="deleteCard(\'' + card.id + '\')">' + t('delete') + '</button>';
      actions.innerHTML = btns;

      showScreen('view');
    }

    function renderViewContent() {
      var container = document.getElementById('viewContent');
      if (viewSide === 'front') {
        container.innerHTML = buildFront(viewingCard);
      } else {
        container.innerHTML = buildBack(viewingCard);
      }
    }

    function showViewSide(side) {
      viewSide = side;
      var tabs = document.querySelectorAll('#viewScreen .preview-tab');
      tabs[0].classList.toggle('active', side === 'front');
      tabs[1].classList.toggle('active', side === 'back');
      renderViewContent();
    }

    // ── Approve ──
    async function approveCard(id) {
      var reviewer = prompt(t('reviewerPrompt'));
      if (reviewer === null) return;
      if (!reviewer.trim()) return;

      try {
        var res = await fetch(API_URL + '?action=approveCard', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id, reviewed_by: reviewer.trim() })
        });
        var data = await res.json();
        if (data.success) {
          showToast(t('cardApproved'));
          // Update local state
          if (viewingCard && viewingCard.id === id) {
            viewingCard.status = 'approved';
            viewingCard.reviewed_by = reviewer.trim();
            viewCard(id); // Re-render
          }
          // Refresh list
          loadCards();
        }
      } catch (e) {
        console.error('Approve failed:', e);
      }
    }

    // ── Print ──
    function printCard(card) {
      var container = document.getElementById('printPages');
      container.innerHTML = '';

      // Front page
      var fp = document.createElement('div');
      fp.className = 'print-card-page';
      fp.innerHTML = buildFront(card);
      container.appendChild(fp);

      // Back page
      var bp = document.createElement('div');
      bp.className = 'print-card-page';
      bp.innerHTML = buildBack(card);
      container.appendChild(bp);

      // Small delay for rendering, then print
      setTimeout(function() { window.print(); }, 200);
    }

    // ── Toast ──
    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(function() {
        toast.classList.remove('visible');
      }, 3000);
    }

    // ── Utilities ──
    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function capitalize(s) {
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    // ── Image Upload ──
    function captureImage(field) {
      activeImageField = field;
      document.getElementById('cameraInput').click();
    }

    function pickImage(field) {
      activeImageField = field;
      document.getElementById('fileInput').click();
    }

    async function handleImageInput(input) {
      var file = input.files && input.files[0];
      if (!file || !activeImageField) return;

      try {
        showToast('Processing image...');
        var blob = await compressImageToBlob(file, 1200, 0.8);

        // Upload to R2
        var url = await uploadImageToR2(blob);
        cardData[activeImageField + '_image'] = url;
        showImagePreview(activeImageField, url);
        showToast('Image added');
      } catch (e) {
        showToast('Failed to process image');
        console.error('Image upload error:', e);
      }

      input.value = '';
      activeImageField = null;
    }

    function compressImageToBlob(file, maxSize, quality) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            var w = img.width;
            var h = img.height;

            if (w > h) {
              if (w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
            } else {
              if (h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }
            }

            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);

            canvas.toBlob(function(blob) {
              if (blob) resolve(blob);
              else reject(new Error('Compression failed'));
            }, 'image/jpeg', quality);
          };
          img.onerror = function() { reject(new Error('Failed to load image')); };
          img.src = e.target.result;
        };
        reader.onerror = function() { reject(new Error('Failed to read file')); };
        reader.readAsDataURL(file);
      });
    }

    function uploadImageToR2(blob) {
      return new Promise(function(resolve, reject) {
        var formData = new FormData();
        formData.append('file', blob, 'tpm-' + Date.now() + '.jpg');

        var xhr = new XMLHttpRequest();
        xhr.addEventListener('load', function() {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var resp = JSON.parse(xhr.responseText);
              if (resp.success && resp.url) resolve(resp.url);
              else reject(new Error(resp.error || 'Upload failed'));
            } catch (e) { reject(new Error('Invalid response')); }
          } else {
            reject(new Error('Upload failed (HTTP ' + xhr.status + ')'));
          }
        });
        xhr.addEventListener('error', function() { reject(new Error('Network error')); });
        xhr.timeout = 60000;
        xhr.addEventListener('timeout', function() { reject(new Error('Upload timed out')); });
        xhr.open('POST', MEDIA_URL + '?action=upload');
        xhr.send(formData);
      });
    }

    function showImagePreview(field, url) {
      var preview = document.getElementById(field + 'ImagePreview');
      var img = document.getElementById(field + 'ImageImg');
      var btns = document.getElementById(field + 'ImageBtns');
      if (preview && img) {
        img.src = url;
        preview.style.display = 'block';
      }
      if (btns) btns.style.display = 'none';
    }

    function hideImagePreview(field) {
      var preview = document.getElementById(field + 'ImagePreview');
      var btns = document.getElementById(field + 'ImageBtns');
      if (preview) preview.style.display = 'none';
      if (btns) btns.style.display = 'flex';
    }

    function removeImage(field) {
      cardData[field + '_image'] = '';
      hideImagePreview(field);
    }

    // ── Annotation Editor ──
    function openAnnotation(field) {
      annotationField = field;
      var url = cardData[field + '_image'];
      if (!url) return;

      document.getElementById('annotationOverlay').style.display = 'flex';
      annotationTool = 'arrow';
      annotationColor = '#e53935';
      drawHistory = [];
      redoHistory = [];

      // Reset tool/color active states
      document.querySelectorAll('.annotation-toolbar .tool-btn[data-tool]').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-tool') === 'arrow');
      });
      document.querySelectorAll('.annotation-toolbar .color-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-color') === '#e53935');
      });

      initAnnotationCanvas(url);
    }

    function closeAnnotation() {
      document.getElementById('annotationOverlay').style.display = 'none';
      annotationField = null;
      annotationImage = null;
      drawHistory = [];
      redoHistory = [];
      // Remove event listeners
      var canvas = document.getElementById('annotationCanvas');
      if (canvas) {
        canvas.removeEventListener('mousedown', handleDrawStart);
        canvas.removeEventListener('mousemove', handleDrawMove);
        canvas.removeEventListener('mouseup', handleDrawEnd);
        canvas.removeEventListener('touchstart', handleTouchStart);
        canvas.removeEventListener('touchmove', handleTouchMove);
        canvas.removeEventListener('touchend', handleTouchEnd);
      }
    }

    function initAnnotationCanvas(imageSrc) {
      annotationCanvas = document.getElementById('annotationCanvas');
      annotationCtx = annotationCanvas.getContext('2d');

      annotationImage = new Image();
      if (!imageSrc.startsWith('data:')) {
        annotationImage.crossOrigin = 'anonymous';
      }

      annotationImage.onload = function() {
        var container = document.getElementById('canvasContainer');
        var maxW = container.clientWidth - 20;
        var maxH = container.clientHeight - 20;
        var w = annotationImage.width;
        var h = annotationImage.height;

        if (w > maxW) { h = h * (maxW / w); w = maxW; }
        if (h > maxH) { w = w * (maxH / h); h = maxH; }

        annotationCanvas.width = w;
        annotationCanvas.height = h;
        annotationCtx.drawImage(annotationImage, 0, 0, w, h);
        saveAnnotationHistory();
        setupAnnotationEvents();
      };
      annotationImage.src = imageSrc;
    }

    function setupAnnotationEvents() {
      var canvas = annotationCanvas;
      canvas.addEventListener('mousedown', handleDrawStart);
      canvas.addEventListener('mousemove', handleDrawMove);
      canvas.addEventListener('mouseup', handleDrawEnd);
      canvas.addEventListener('mouseleave', handleDrawEnd);
      canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
      canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
      canvas.addEventListener('touchend', handleTouchEnd);
    }

    function getCanvasCoords(e) {
      var rect = annotationCanvas.getBoundingClientRect();
      var scaleX = annotationCanvas.width / rect.width;
      var scaleY = annotationCanvas.height / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function getTouchCoords(e) {
      var touch = e.touches[0] || e.changedTouches[0];
      var rect = annotationCanvas.getBoundingClientRect();
      var scaleX = annotationCanvas.width / rect.width;
      var scaleY = annotationCanvas.height / rect.height;
      return {
        x: (touch.clientX - rect.left) * scaleX,
        y: (touch.clientY - rect.top) * scaleY
      };
    }

    function handleTouchStart(e) {
      e.preventDefault();
      var fakeEvent = { clientX: 0, clientY: 0 };
      var touch = e.touches[0];
      fakeEvent.clientX = touch.clientX;
      fakeEvent.clientY = touch.clientY;
      handleDrawStart(fakeEvent);
    }

    function handleTouchMove(e) {
      e.preventDefault();
      var touch = e.touches[0];
      handleDrawMove({ clientX: touch.clientX, clientY: touch.clientY });
    }

    function handleTouchEnd(e) {
      handleDrawEnd();
    }

    function handleDrawStart(e) {
      if (annotationTool === 'text') {
        handleTextPlace(e);
        return;
      }
      isDrawing = true;
      drawStart = getCanvasCoords(e);
      freehandPoints = [drawStart];

      if (annotationTool === 'freehand') {
        annotationCtx.beginPath();
        annotationCtx.moveTo(drawStart.x, drawStart.y);
        annotationCtx.strokeStyle = annotationColor;
        annotationCtx.lineWidth = 3;
        annotationCtx.lineCap = 'round';
        annotationCtx.lineJoin = 'round';
      }
    }

    function handleDrawMove(e) {
      if (!isDrawing) return;
      var pos = getCanvasCoords(e);

      if (annotationTool === 'freehand') {
        annotationCtx.lineTo(pos.x, pos.y);
        annotationCtx.stroke();
        freehandPoints.push(pos);
      } else {
        redrawFromHistory();
        drawShape(drawStart, pos, true);
      }
    }

    function handleDrawEnd() {
      if (!isDrawing) return;
      isDrawing = false;
      if (annotationTool === 'freehand') {
        annotationCtx.closePath();
      }
      saveAnnotationHistory();
      redoHistory = [];
    }

    function drawShape(start, end, preview) {
      annotationCtx.save();
      annotationCtx.strokeStyle = annotationColor;
      annotationCtx.fillStyle = annotationColor;
      annotationCtx.lineWidth = 3;
      annotationCtx.lineCap = 'round';

      if (annotationTool === 'arrow') {
        drawArrowShape(start, end);
      } else if (annotationTool === 'circle') {
        drawCircleShape(start, end);
      } else if (annotationTool === 'rect') {
        drawRectShape(start, end);
      }

      annotationCtx.restore();
    }

    function drawArrowShape(start, end) {
      var headLen = 15;
      var dx = end.x - start.x;
      var dy = end.y - start.y;
      var angle = Math.atan2(dy, dx);

      annotationCtx.beginPath();
      annotationCtx.moveTo(start.x, start.y);
      annotationCtx.lineTo(end.x, end.y);
      annotationCtx.stroke();

      annotationCtx.beginPath();
      annotationCtx.moveTo(end.x, end.y);
      annotationCtx.lineTo(end.x - headLen * Math.cos(angle - Math.PI / 6), end.y - headLen * Math.sin(angle - Math.PI / 6));
      annotationCtx.lineTo(end.x - headLen * Math.cos(angle + Math.PI / 6), end.y - headLen * Math.sin(angle + Math.PI / 6));
      annotationCtx.closePath();
      annotationCtx.fill();
    }

    function drawCircleShape(start, end) {
      var rx = Math.abs(end.x - start.x) / 2;
      var ry = Math.abs(end.y - start.y) / 2;
      var cx = Math.min(start.x, end.x) + rx;
      var cy = Math.min(start.y, end.y) + ry;
      annotationCtx.beginPath();
      annotationCtx.ellipse(cx, cy, Math.max(rx, 1), Math.max(ry, 1), 0, 0, Math.PI * 2);
      annotationCtx.stroke();
    }

    function drawRectShape(start, end) {
      var x = Math.min(start.x, end.x);
      var y = Math.min(start.y, end.y);
      annotationCtx.strokeRect(x, y, Math.abs(end.x - start.x), Math.abs(end.y - start.y));
    }

    function handleTextPlace(e) {
      var pos = getCanvasCoords(e);
      var text = prompt(appLang === 'es' ? 'Ingrese texto:' : 'Enter text:');
      if (!text) return;

      annotationCtx.save();
      annotationCtx.font = 'bold 18px sans-serif';
      var metrics = annotationCtx.measureText(text);
      var pad = 4;
      annotationCtx.fillStyle = 'rgba(255,255,255,0.85)';
      annotationCtx.fillRect(pos.x - pad, pos.y - 16 - pad, metrics.width + pad * 2, 20 + pad * 2);
      annotationCtx.fillStyle = annotationColor;
      annotationCtx.fillText(text, pos.x, pos.y);
      annotationCtx.restore();

      saveAnnotationHistory();
      redoHistory = [];
    }

    function selectTool(tool) {
      annotationTool = tool;
      document.querySelectorAll('.annotation-toolbar .tool-btn[data-tool]').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-tool') === tool);
      });
    }

    function selectColor(color) {
      annotationColor = color;
      document.querySelectorAll('.annotation-toolbar .color-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-color') === color);
      });
    }

    function saveAnnotationHistory() {
      var dataUrl = annotationCanvas.toDataURL('image/png');
      drawHistory.push(dataUrl);
      if (drawHistory.length > 30) drawHistory.shift();
      // Pre-load for fast preview redraw
      lastSavedState = new Image();
      lastSavedState.src = dataUrl;
    }

    function redrawFromHistory() {
      if (lastSavedState) {
        annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
        annotationCtx.drawImage(lastSavedState, 0, 0);
      }
    }

    function annotationUndo() {
      if (drawHistory.length <= 1) return;
      redoHistory.push(drawHistory.pop());
      var prev = drawHistory[drawHistory.length - 1];
      var img = new Image();
      img.onload = function() {
        annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
        annotationCtx.drawImage(img, 0, 0);
      };
      img.src = prev;
    }

    function annotationRedo() {
      if (redoHistory.length === 0) return;
      var next = redoHistory.pop();
      drawHistory.push(next);
      var img = new Image();
      img.onload = function() {
        annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
        annotationCtx.drawImage(img, 0, 0);
      };
      img.src = next;
    }

    async function saveAnnotation() {
      if (!annotationField) return;
      try {
        showToast('Saving annotated image...');
        var blob = await new Promise(function(resolve) {
          annotationCanvas.toBlob(resolve, 'image/jpeg', 0.85);
        });
        var url = await uploadImageToR2(blob);
        cardData[annotationField + '_image'] = url;
        showImagePreview(annotationField, url);
        closeAnnotation();
        showToast('Image saved');
      } catch (e) {
        showToast('Failed to save image');
        console.error('Annotation save error:', e);
      }
    }

    // ── Init ──
    document.addEventListener('DOMContentLoaded', function() {
      applyTranslations();
      updateWizardLabels();
      loadCards();

      // Live preview: update desktop preview on any form input
      var debounceTimer = null;
      document.getElementById('wizardScreen').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updateDesktopPreview, 300);
      });
    });
  </script>
</body>
</html>
