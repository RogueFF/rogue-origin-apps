name = "mission-control-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "REDACTED-CF-ACCOUNT-ID"

[dev]
port = 8788
local_protocol = "http"

[env.production]
name = "mission-control-api"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "mission-control-db"
database_id = "REDACTED-D1-MC-ID"

# Cron: sync ClickUp every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# CORS configuration
[vars]
ALLOWED_ORIGINS = "https://rogueff.github.io,http://localhost:3000,http://localhost:5500,http://localhost:8080"
