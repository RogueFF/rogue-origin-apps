name = "warroom-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
account_id = "REDACTED-CF-ACCOUNT-ID"

[dev]
port = 8791
local_protocol = "http"

[env.production]
name = "warroom-api"

[[d1_databases]]
binding = "DB"
database_name = "warroom-db"
database_id = "REDACTED-D1-WARROOM-ID"

[vars]
ALLOWED_ORIGINS = "https://rogueff.github.io,http://localhost:3000,http://localhost:5500,http://localhost:8080"
# Set via: wrangler secret put WEBHOOK_URL
# Set via: wrangler secret put WEBHOOK_SECRET
